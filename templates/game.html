<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>WereGood</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script>
        window.TON_CONNECT_UI = null;
        const tonScript = document.createElement('script');
        tonScript.src = 'https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js';
        tonScript.onload = function() {
            if (window.TON_CONNECT_UI) console.log('TON Connect ready');
            else if (window.tonconnect) window.TON_CONNECT_UI = window.tonconnect;
            window.dispatchEvent(new Event('tonconnect-ready'));
        };
        tonScript.onerror = function() {
            const btn = document.getElementById('tonDonateBtn');
            if (btn) { btn.style.opacity = '0.5'; btn.disabled = true; }
        };
        document.head.appendChild(tonScript);
    </script>

    <!-- Telegram Mini Apps Analytics SDK -->
    <script>
        (function() {
            if (window.Telegram && window.Telegram.WebApp) {
                var script = document.createElement('script');
                script.src = 'https://tganalytics.xyz/index.js';
                script.onload = function() {
                    window.telegramAnalytics.init({
                        token: 'eyJhcHBfbmFtZSI6IndlcmVnb29kIiwiYXBwX3VybCI6Imh0dHBzOi8vdC5tZS9XZXJlR29vb2Rib3QiLCJhcHBfZG9tYWluIjoiaHR0cHM6Ly93ZXJlZ29vZC5ydS8ifQ==!/Jd1QUzU6q1h1gN60VfBz53M1flHZlcVC5pcyACO9tM='
                    });
                    window.telegramAnalytics.trackEvent('app_started');
                };
                document.head.appendChild(script);
            }
        })();
    </script>
</head>
<body>
    <div class="app">
        {% include 'game/header.html' %}

        <main class="main-content">
            {% include 'game/home.html' %}
            {% include 'game/shop.html' %}
            {% include 'game/lottery.html' %}
            {% include 'game/profile.html' %}
        </main>

        <nav class="bottom-nav" id="bottomNav">
            <div class="nav-item active" data-tab="home">
                <div class="nav-icon"><img src="/static/home_normal.png" alt="Главная" style="width: 24px; height: 24px;"></div>
                <div class="nav-label" data-lang="nav_home">Главная</div>
            </div>
            <div class="nav-item" data-tab="shop">
                <div class="nav-icon"><img src="/static/shop_normal.png" alt="Магазин" style="width: 24px; height: 24px;"></div>
                <div class="nav-label" data-lang="nav_shop">Магазин</div>
            </div>
            <div class="nav-item" data-tab="lottery">
                <div class="nav-icon"><img src="/static/fire_normal.png" alt="Вызов" style="width: 24px; height: 24px;"></div>
                <div class="nav-label" data-lang="nav_lottery">Вызов</div>
            </div>
            <div class="nav-item" data-tab="profile">
                <div class="nav-icon"><img src="/static/profile_normal.png" alt="Профиль" style="width: 24px; height: 24px;"></div>
                <div class="nav-label" data-lang="nav_profile">Профиль</div>
            </div>
        </nav>
    </div>



    {% include 'game/modals.html' %}
    {% include 'game/fortune.html' %}

    <audio id="errorSound" preload="auto"><source src="/static/error.mp3" type="audio/mpeg"></audio>
    <audio id="clickSound" preload="auto"><source src="/static/click.mp3" type="audio/mpeg"></audio>
    <audio id="navSound" preload="auto"><source src="/static/nav.mp3" type="audio/mpeg"></audio>
    <audio id="lpDropSound" preload="auto"><source src="/static/lp_drop.mp3" type="audio/mpeg"></audio>
    <audio id="settingsSound" preload="auto"><source src="/static/settings.mp3" type="audio/mpeg"></audio>
    <audio id="purchaseSound" preload="auto"><source src="/static/purchase.mp3" type="audio/mpeg"></audio>

    {% include 'game/scripts.html' %}
</body>
</html>
