<div id="ticketsPage" class="tickets-page modal-overlay">
    <div class="tickets-header">
        <button class="back-btn" onclick="closeTicketsPage()">←</button>
        <h2 data-lang="my_tickets_title">🎫 Мои билеты</h2>
    </div>
    <div class="tickets-carousel">
        <div class="carousel-dots" id="carouselDots"></div>
        <div class="tickets-container" id="ticketsContainer"></div>
    </div>
</div>

<div id="playerModal" class="modal-overlay">
    <div class="modal-content player-modal-content">
        <div class="modal-close" onclick="closePlayerModal()">✕</div>
        <div class="player-profile-header">
            <div class="player-avatar" id="playerModalAvatar">👤</div>
            <div class="player-info">
                <div class="player-username" id="playerModalUsername"></div>
                <div class="player-badges" id="playerModalBadges"></div>
            </div>
        </div>
        <div class="player-stats">
            <div class="player-stat"><div class="player-stat-value" id="playerModalClicks">0</div><div class="player-stat-label" data-lang="clicks">Кликов</div></div>
            <div class="player-stat"><div class="player-stat-value" id="playerModalWG">0</div><div class="player-stat-label">WG</div></div>
            <div class="player-stat"><div class="player-stat-value" id="playerModalLP">0</div><div class="player-stat-label" data-lang="lp">LP</div></div>
            <div class="player-stat"><div class="player-stat-value usdt" id="playerModalUSDT">💰 0</div><div class="player-stat-label">USDT</div></div>
            <div class="player-stat"><div class="player-stat-value" id="playerModalWins">0</div><div class="player-stat-label" data-lang="wins">Побед</div></div>
        </div>
        <div class="player-votes">
            <button class="vote-btn like-btn" onclick="voteForPlayer('like')">👍 <span id="playerModalLikes">0</span></button>
            <button class="vote-btn dislike-btn" onclick="voteForPlayer('dislike')">👎 <span id="playerModalDislikes">0</span></button>
        </div>
        <div id="voteMessage" class="vote-message"></div>
    </div>
</div>

<div id="leaderboardPage" class="leaderboard-page modal-overlay">
    <div class="leaderboard-header">
        <button class="back-btn" onclick="closeLeaderboard()">←</button>
        <h2 data-lang="leaderboard_title">🏆 Таблица лидеров</h2>
    </div>
    <div class="daily-timer-container" id="dailyTimerContainer">
        <div class="daily-timer-icon">⏰</div>
        <div class="daily-timer-info">
            <div class="daily-timer-label" data-lang="daily_timer_label">До окончания дня:</div>
            <div class="daily-timer-value" id="dailyLeaderboardTimer">-- : -- : --</div>
        </div>
    </div>
    <div class="leaderboard-tabs">
        <button class="leaderboard-tab active" data-period="day" data-lang="top_day">🏆 Топ дня</button>
        <button class="leaderboard-tab" data-period="week" data-lang="top_week">📅 Топ недели</button>
        <button class="leaderboard-tab" data-period="month" data-lang="top_month">📆 Топ месяца</button>
    </div>
    <div class="leaderboard-list" id="leaderboardList" data-lang="loading">Загрузка...</div>
</div>

<div id="withdrawalModal" class="modal-overlay">
    <div class="modal-content withdrawal-modal-content">
        <div class="modal-header">
            <h2 data-lang="withdraw">💸 Вывод USDT</h2>
            <button class="modal-close" onclick="closeWithdrawalModal()">✕</button>
        </div>
        <div class="withdrawal-tabs">
            <div class="withdrawal-tab active" data-withdrawal-tab="new" data-lang="new_withdrawal">📤 Новый</div>
            <div class="withdrawal-tab" data-withdrawal-tab="history" data-lang="withdrawal_history">📋 История</div>
        </div>
        <div id="withdrawalNew" class="withdrawal-tab-content active">
            <div class="withdrawal-balance-card">
                <span data-lang="your_balance_usdt">Ваш баланс USDT</span>
                <div id="withdrawalBalance">0</div>
            </div>
            <div class="form-group">
                <input type="number" class="form-input" id="withdrawalAmount" placeholder="Минимум 2 USDT">
                <input type="text" class="form-input" id="withdrawalAddress" placeholder="Адрес кошелька">
                <select class="form-select" id="withdrawalNetwork">
                    <option value="TRC20">TRC20 (TRON)</option>
                    <option value="ERC20">ERC20 (Ethereum)</option>
                </select>
            </div>
            <button class="withdrawal-submit-btn" onclick="createWithdrawal()" data-lang="send_request">📤 Отправить</button>
        </div>
        <div id="withdrawalHistory" class="withdrawal-tab-content" style="display:none"><div id="withdrawalHistoryList"></div></div>
    </div>
</div>

<div id="dailyModal" class="modal-overlay">
    <div class="modal-content daily-modal-content">
        <div class="modal-header"><h2 data-lang="daily_rewards">📅 Награды</h2><button class="modal-close" onclick="closeDailyModal()">✕</button></div>
        <div class="daily-rewards-grid" id="dailyRewardsGrid"></div>
        <button class="daily-claim-btn" id="dailyClaimBtn" onclick="claimDailyReward()">Забрать награду</button>
    </div>
</div>

<div id="promoModal" class="modal-overlay">
    <div class="modal-content promo-modal-content">
        <div class="modal-header"><h2 data-lang="activate_promo">🎫 Промокод</h2><button class="modal-close" onclick="closePromoModal()">✕</button></div>
        <input type="text" class="form-input" id="promoCodeInput" placeholder="Введите код">
        <button class="promo-activate-btn" id="activatePromoBtn">🎁 Активировать</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<div id="tutorialOverlay" class="tutorial-overlay">
    <div id="tutorialHighlight"></div>
    <div id="tutorialTooltip">
        <p id="tutorialText"></p>
        <button id="tutorialNextBtn" data-lang="next">Далее</button>
    </div>
</div>

<div id="casePage" class="case-page">
    <div class="case-page-content">
        <div class="case-header">
            <button class="case-back-btn" onclick="closeCase()">←</button>
            <h2 id="caseTitle">📦 Кейс</h2>
        </div>

        <div class="case-carousel-container">
            <div class="case-carousel-window">
                <div class="case-shadow-top"></div>
                <div class="case-carousel-track" id="caseCarouselTrack"></div>
                <div class="case-carousel-pointer">▼</div>
                <div class="case-shadow-bottom"></div>
                <div class="case-slot-glow"></div>
            </div>
        </div>

        <div class="case-info">
            <div>💰 Цена: <span id="casePriceDisplay">0</span> WG</div>
            <div>🎫 Доступно: <span id="caseCount">0</span></div>
        </div>

        <div class="case-actions">
            <button class="case-spin-btn" id="caseSpinBtn" onclick="spinCase()">🎰 ОТКРЫТЬ</button>
            <button class="case-buy-btn" onclick="buyCase()">💰 Купить</button>
        </div>

        <div class="case-rewards-list" id="caseRewardsList"></div>
    </div>
</div>
