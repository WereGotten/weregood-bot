<div id="tabHome" class="tab-pane active">
    <div class="greeting" data-lang="greeting">Привет, <span id="userGreeting">Игрок</span>!</div>

    <div class="balance-card">
        <div class="balance-info">
            <div class="balance-label">
                <img src="/static/wallet.png" alt="WG" style="width: 28px; height: 28px;">
                <span data-lang="wg_coin">WG Coin</span>
            </div>
            <div class="balance-value"><span id="wgBalance">0</span> WG</div>
        </div>
        <div class="balance-info secondary">
            <div class="balance-label">
                <img src="/static/diamond.png" alt="LP" style="width: 32px; height: 32px;">
                <span data-lang="lp">LP</span>
            </div>
            <div class="balance-value"><span id="lpBalance">0</span> LP</div>
        </div>
    </div>

    <!-- ========== PAYDAY ИНДИКАТОР ========== -->
    <div id="paydayIndicator" style="display: none; background: linear-gradient(135deg, #FF6B00, #FF4500); padding: 8px 16px; border-radius: 30px; font-weight: 700; color: white; animation: pulse 1.5s infinite; margin: 10px 0; text-align: center;">
        <span data-lang="payday_active">🔥 PAYDAY ACTIVE! Множитель:</span> <span id="paydayMultiplierIndicator">2.0</span>x
    </div>

    <div class="game-container">
        <div class="joystick-corner-left" onclick="openContestPage()">
            <div class="joystick-small-left">
                <img src="/static/invite.png" alt="Конкурс" style="width: 28px; height: 28px;">
            </div>
        </div>
        <div class="coin-wrapper">
            <div class="coin" id="coin">
                <div class="coin-inner"></div>
                <div class="click-plus" id="clickPlus">+<span id="clickAmount">0.01</span></div>
            </div>
        </div>
        <div class="joystick-corner-right" onclick="openGamepad()">
            <div class="joystick-small-right">🎮</div>
        </div>
    </div>

    <div class="earnings-info">
        <span><img src="/static/wallet.png" alt="WG" style="width: 20px; height: 20px;"> <span data-lang="earnings">Заработок</span>: <strong id="earningPerClick">0.01</strong> WG</span>
        <span><img src="/static/dice.png" alt="Шанс" style="width: 26px; height: 26px;"> <span data-lang="lp_chance">Шанс на LP</span>: 0.25%</span>
    </div>

    <div class="energy-card">
        <div class="energy-header">
            <span><img src="/static/lightning.png" alt="Энергия" style="width: 16px; height: 16px;"> <span data-lang="energy">Энергия</span></span>
            <span><span id="energyValue">500</span>/<span id="maxEnergyValue">500</span></span>
        </div>
        <div class="energy-bar-container"><div class="energy-bar" id="energyBar"></div></div>
        <div class="energy-regen" id="regenInfo" data-lang="energy_regen">🕐 Полное восстановление через 2 часа</div>
    </div>

    <div class="stats-mini">
        <div class="stat-mini-item"><div class="stat-mini-icon"><img src="/static/wallet.png" style="width:30px"></div><div class="stat-mini-value" id="totalWGmini">0</div><div class="stat-mini-label" data-lang="total_wg">Всего WG</div></div>
        <div class="stat-mini-item"><div class="stat-mini-icon"><img src="/static/ticket.png" style="width:30px"></div><div class="stat-mini-value" id="totalTicketsMini">0</div><div class="stat-mini-label" data-lang="tickets">Билетов</div></div>
        <div class="stat-mini-item"><div class="stat-mini-icon"><img src="/static/click.png" style="width:30px"></div><div class="stat-mini-value" id="totalClicksMini">0</div><div class="stat-mini-label" data-lang="clicks">Кликов</div></div>
    </div>

    <!-- ========== ЛИДЕРБОРД СО СКЕЛЕТОНОМ (БЕЗ МЕЛЬКАНИЯ) ========== -->
    <div class="leaderboard-mini" onclick="openLeaderboard()">
        <div class="leaderboard-mini-header">
            <span data-lang="top_players">🏆 Топ игроков</span>
            <span>→</span>
        </div>
        <div class="leaderboard-mini-list" id="leaderboardMini">
            <!-- Скелетон (показывается пока грузятся данные) -->
            <div class="leaderboard-skeleton" id="leaderboardSkeleton">
                <div class="skeleton-row" style="display:flex;align-items:center;gap:8px;height:24px;padding:4px 0;">
                    <span class="skeleton-shimmer" style="width:20px;height:14px;background:rgba(255,255,255,0.06);border-radius:4px;display:inline-block;"></span>
                    <span class="skeleton-shimmer" style="width:24px;height:24px;background:rgba(255,255,255,0.06);border-radius:50%;display:inline-block;"></span>
                    <span class="skeleton-shimmer" style="flex:1;height:14px;background:rgba(255,255,255,0.06);border-radius:4px;display:inline-block;"></span>

                    <span class="skeleton-shimmer" style="width:40px;height:14px;background:rgba(255,255,255,0.06);border-radius:4px;display:inline-block;"></span>
                </div>

                    <span class="skeleton-shimmer" style="width:20px;height:14px;background:rgba(255,255,255,0.06);border-radius:4px;display:inline-block;"></span>

                    <span class="skeleton-shimmer" style="width:24px;height:24px;background:rgba(255,255,255,0.06);border-radius:50%;display:inline-block;"></span>
                    <span class="skeleton-shimmer" style="flex:1;height:14px;background:rgba(255,255,255,0.06);border-radius:4px;display:inline-block;"></span>
                    <span class="skeleton-shimmer" style="width:40px;height:14px;background:rgba(255,255,255,0.06);border-radius:4px;display:inline-block;"></span>
                </div>
                <div class="skeleton-row" style="display:flex;align-items:center;gap:8px;height:24px;padding:4px 0;">
                    <span class="skeleton-shimmer" style="width:20px;height:14px;background:rgba(255,255,255,0.06);border-radius:4px;display:inline-block;"></span>
                    <span class="skeleton-shimmer" style="width:24px;height:24px;background:rgba(255,255,255,0.06);border-radius:50%;display:inline-block;"></span>
                    <span class="skeleton-shimmer" style="flex:1;height:14px;background:rgba(255,255,255,0.06);border-radius:4px;display:inline-block;"></span>
                    <span class="skeleton-shimmer" style="width:40px;height:14px;background:rgba(255,255,255,0.06);border-radius:4px;display:inline-block;"></span>
                </div>
            </div>
        </div>
    </div>
</div>
