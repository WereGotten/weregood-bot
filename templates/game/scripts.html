    async function loadFortuneData() {
        if (window.isFortuneRoundEnding) {
            console.log('🔄 Фортуна: обновление пропущено (колесо крутится)');
            return;
        }
        try {
            const response = await fetch('/api/fortune/status');
            const data = await response.json();
            if (data.success) {
                const savedUserBetTeam = fortuneData?.userBetTeam;
                const savedUserBetAmount = fortuneData?.userBetAmount;
                if (typeof fortuneData !== 'undefined') {
                    fortuneData.timeLeft = data.time_left || 0;
                    fortuneData.yellowPool = data.yellow_pool || 0;
                    fortuneData.redPool = data.red_pool || 0;
                    fortuneData.yellowPlayers = data.yellow_bets || [];
                    fortuneData.redPlayers = data.red_bets || [];
                    if (savedUserBetTeam && savedUserBetAmount > 0) {
                        fortuneData.userBetTeam = savedUserBetTeam;
                        fortuneData.userBetAmount = savedUserBetAmount;
                        console.log('🔄 Восстановлена ставка пользователя:', savedUserBetTeam, savedUserBetAmount);
                    }
                }
                if (typeof updateFortuneUI === 'function') {
                    updateFortuneUI();
                } else {
                    const elements = {
                        yellowPool: document.getElementById('yellowPool'),
                        redPool: document.getElementById('redPool'),
                        timer: document.getElementById('fortuneTimer')
                    };
                    if (elements.yellowPool) elements.yellowPool.innerText = (data.yellow_pool || 0).toFixed(2) + ' WG';
                    if (elements.redPool) elements.redPool.innerText = (data.red_pool || 0).toFixed(2) + ' WG';
                    if (elements.timer) {
                        const m = Math.floor((data.time_left || 0) / 60);
                        const s = (data.time_left || 0) % 60;
                        elements.timer.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                    }
                    if (typeof updatePlayersListAsync === 'function') {
                        updatePlayersListAsync();
                    }
                }
            }
        } catch (e) {
            console.error('Ошибка при загрузке данных Фортуны:', e);
        }
    }

    async function loadUserCurrentBet() {
        try {
            const response = await fetch('/api/fortune/user_total_bet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId })
            });
            const data = await response.json();
            if (data.success) {
                fortuneData.userBetTeam = data.team;
                fortuneData.userBetAmount = data.amount || 0;
                if (data.team && data.amount > 0) {
                    const targetList = data.team === 'yellow' ? fortuneData.yellowPlayers : fortuneData.redPlayers;
                    const existingBet = targetList.find(p => p.userId == userId);
                    if (!existingBet) {
                        targetList.push({
                            userId: userId,
                            amount: data.amount,
                            netAmount: data.amount,
                            avatarUrl: photoUrl || '',
                            username: firstName || username || 'Игрок'
                        });
                        if (typeof updatePlayersListAsync === 'function') {
                            updatePlayersListAsync(true);
                        }
                    } else if (existingBet.amount !== data.amount) {
                        existingBet.amount = data.amount;
                        existingBet.netAmount = data.amount;
                        if (typeof updatePlayersListAsync === 'function') {
                            updatePlayersListAsync(true);
                        }
                    }
                }
                if (typeof updateTeamHighlightUI === 'function') {
                    updateTeamHighlightUI();
                }
            }
        } catch(e) {
            console.error('Load user bet error:', e);
        }

    function updateTeamHighlightUI() {
        const e = fortuneUI.elements;
        if (!e.yellowCard || !e.redCard) return;
        if (fortuneData.userBetTeam === 'yellow') {
            e.yellowCard.classList.add('selected');
            e.redCard.classList.remove('selected');
        } else if (fortuneData.userBetTeam === 'red') {
            e.redCard.classList.add('selected');
            e.yellowCard.classList.remove('selected');
        } else {
            e.yellowCard.classList.remove('selected');
            e.redCard.classList.remove('selected');
        }
    }

    async function loadFortuneHistory() {
        const e = fortuneUI.elements;
        if (!e.historyList) return;
        e.historyList.innerHTML = '<div class="loading">Загрузка...</div>';
        try {
            const response = await fetch('/api/fortune/history', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, limit: 20 })
            });
            const data = await response.json();
            if (data.success) {
                if (data.history.length === 0) {
                    e.historyList.innerHTML = '<div class="empty-state-premium">📭 У вас пока нет истории игр</div>';
                } else {
                    let html = '';
                    for (let i = 0; i < data.history.length; i++) {
                        const item = data.history[i];
                        const teamName = item.team === 'yellow' ? '🟡 Жёлтые' : '🔴 Красные';
                        const resultClass = item.result === 'win' ? 'win' : 'lose';
                        const resultText = item.result === 'win' ? `+${item.win_amount} WG` : `-${item.amount} WG`;
                        const date = new Date(item.created_at).toLocaleString();
                        html += `<div class="history-item-premium">
                            <div class="history-team-premium">
                                <span class="history-team-icon-premium">${item.team === 'yellow' ? '' : ''}</span>
                                <span class="history-team-name-premium">${teamName}</span>
                            </div>
                            <div class="history-details-premium">
                                <span class="history-amount-premium">${item.amount} WG</span>
                                <span class="history-result-premium ${resultClass}">${resultText}</span>
                            </div>
                            <div class="history-date-premium">${date}</div>
                        </div>`;
                    }
                    e.historyList.innerHTML = html;
                }
            } else {
                e.historyList.innerHTML = '<div class="empty-state-premium">❌ Ошибка загрузки истории</div>';
            }
        } catch(e) {
            console.error('Load history error:', e);
            e.historyList.innerHTML = '<div class="empty-state-premium">❌ Ошибка загрузки истории</div>';
        }

        betModalState.team = team;
        betModalState.isOpen = true;
        const teamName = team === 'yellow' ? 'Команда Жёлтых' : 'Команда Красных';
        const teamIcon = team === 'yellow' ? '🟡' : '🔴';

    let isBetting = false;

    async function submitBet() {
        if (isBetting) {
            showFortuneMessage('⏳ Подождите, ставка обрабатывается...', 'info');
            return;
        }
        if (!betModalState.team) {
            showFortuneMessage('Выберите команду для ставки', 'error');
            return;
        }
        const amount = parseFloat(document.getElementById('betAmount')?.value || '0');
        if (isNaN(amount) || amount < 10) {
            showFortuneMessage('Минимальная ставка — 10 WG', 'error');
            return;
        }
        if (amount > (localWG || 0)) {
            showFortuneMessage(`❌ Не хватает WG! У вас ${(localWG || 0).toFixed(2)} WG`, 'error');
            return;
        }
        isBetting = true;
        const submitBtn = document.getElementById('submitBetBtn');
        const originalText = submitBtn?.innerHTML || 'Подтвердить';
        if (submitBtn) submitBtn.innerHTML = '⏳ Обработка...';
        try {
            const response = await fetch('/api/fortune/bet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, team: betModalState.team, amount: amount })
            });
            const data = await response.json();
            if (data.success) {
                localWG = (localWG || 0) - amount;
                fortuneData.yellowPool = data.yellow_pool;
                fortuneData.redPool = data.red_pool;
                fortuneData.userBetTeam = betModalState.team;
                fortuneData.userBetAmount = data.user_total_bet || amount;
                const targetList = betModalState.team === 'yellow' ? fortuneData.yellowPlayers : fortuneData.redPlayers;
                const existingIndex = targetList.findIndex(p => p.userId == userId);
                const updatedPlayer = {
                    userId: userId,
                    amount: fortuneData.userBetAmount,
                    netAmount: data.net_amount || amount,
                    avatarUrl: photoUrl || '',
                    username: firstName || username || 'Игрок'
                };
                if (existingIndex >= 0) {
                    targetList[existingIndex] = updatedPlayer;
                } else {
                    targetList.push(updatedPlayer);
                }
                if (typeof updateUI === 'function') updateUI();
                else if (typeof syncData === 'function') syncData(true);
                updateFortuneUI();
                updateTeamHighlightUI();
                showFortuneMessage(`✅ Ставка ${amount} WG принята! Всего на команду: ${fortuneData.userBetAmount} WG`, 'success');
                closeBetModal();
            } else {
                showFortuneMessage(data.error || 'Ошибка при ставке', 'error');
            }
        } catch(e) {
            console.error('Bet error:', e);
            showFortuneMessage('Ошибка при ставке', 'error');
        } finally {
            isBetting = false;
            if (submitBtn) submitBtn.innerHTML = originalText;
        }
    }

                historyTab.classList.add('active');

                loadFortuneHistory();

    function initBetPresets() {
        const presets = document.querySelectorAll('.bet-preset-premium');
        const betAmountInput = document.getElementById('betAmount');
        presets.forEach(btn => {
            btn.removeEventListener('click', presetHandler);
            btn.addEventListener('click', presetHandler);
        });
        function presetHandler(e) {
            const multiplier = parseFloat(e.currentTarget.getAttribute('data-multiplier'));
            if (!isNaN(multiplier) && betAmountInput) {
                const presetAmount = Math.floor((localWG || 0) * multiplier);
                betAmountInput.value = Math.max(10, presetAmount);
            }
        }
    }

    let fortuneUpdateInterval = null;

    if (document.readyState === 'loading') {

        initFortuneEventHandlers();

    // ========== КОЛЕСО ФОРТУНЫ ==========
    let wheelCanvas = document.getElementById('wheelCanvas');
    let wheelCtx = wheelCanvas?.getContext('2d');
    let wheelAnimationId = null;
    let wheelRotation = 0;
    let wheelTargetRotation = 0;
    let wheelStartTime = 0;
    let wheelWinner = null;
    let wheelPrizes = {};
    let isPreCaching = false;
    let wheelDuration = 15000;
    let fullRotationsCount = 12;
    let cachedWheelCanvas = document.createElement('canvas');
    let cachedWheelCtx = cachedWheelCanvas.getContext('2d');
    let isWheelCached = false;

    function cacheWheelGraphics(yellowChance, redChance) {
        if (!wheelCanvas || !cachedWheelCtx) return;
        cachedWheelCanvas.width = wheelCanvas.width;
        cachedWheelCanvas.height = wheelCanvas.height;
        const size = cachedWheelCanvas.width;
        const centerX = size / 2;
        const centerY = size / 2;
        const radius = size / 2 - 22;
        cachedWheelCtx.clearRect(0, 0, size, size);
        let yellowGrad = cachedWheelCtx.createRadialGradient(centerX, centerY, radius * 0.1, centerX, centerY, radius);
        yellowGrad.addColorStop(0, '#FFE666');
        yellowGrad.addColorStop(0.5, '#F1C40F');
        yellowGrad.addColorStop(1, '#8A6900');
        let redGrad = cachedWheelCtx.createRadialGradient(centerX, centerY, radius * 0.1, centerX, centerY, radius);
        redGrad.addColorStop(0, '#FF8080');
        redGrad.addColorStop(0.5, '#E74C3C');
        redGrad.addColorStop(1, '#6B160E');
        const yellowAngle = (yellowChance / 100) * Math.PI * 2;
        const redAngle = (Math.PI * 2) - yellowAngle;
        cachedWheelCtx.beginPath();
        cachedWheelCtx.moveTo(centerX, centerY);
        cachedWheelCtx.arc(centerX, centerY, radius, 0, yellowAngle);
        cachedWheelCtx.closePath();
        cachedWheelCtx.fillStyle = yellowGrad;
        cachedWheelCtx.fill();
        cachedWheelCtx.beginPath();
        cachedWheelCtx.moveTo(centerX, centerY);
        cachedWheelCtx.arc(centerX, centerY, radius, yellowAngle, Math.PI * 2);
        cachedWheelCtx.closePath();
        cachedWheelCtx.fillStyle = redGrad;
        cachedWheelCtx.fill();
        cachedWheelCtx.lineWidth = 4;
        cachedWheelCtx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
        cachedWheelCtx.beginPath();
        cachedWheelCtx.moveTo(centerX, centerY);
        cachedWheelCtx.lineTo(centerX + radius * Math.cos(0), centerY + radius * Math.sin(0));
        cachedWheelCtx.stroke();
        cachedWheelCtx.beginPath();
        cachedWheelCtx.moveTo(centerX, centerY);
        cachedWheelCtx.lineTo(centerX + radius * Math.cos(yellowAngle), centerY + radius * Math.sin(yellowAngle));
        cachedWheelCtx.stroke();
        cachedWheelCtx.save();
        cachedWheelCtx.font = '900 26px "Arial Black", Gadget, sans-serif';
        cachedWheelCtx.textAlign = 'center';
        cachedWheelCtx.textBaseline = 'middle';
        cachedWheelCtx.fillStyle = '#FFFFFF';
        cachedWheelCtx.shadowColor = 'rgba(0, 0, 0, 0.7)';
        cachedWheelCtx.shadowBlur = 8;
        const yellowMidAngle = yellowAngle / 2;
        const yellowTextX = centerX + radius * 0.62 * Math.cos(yellowMidAngle);
        const yellowTextY = centerY + radius * 0.62 * Math.sin(yellowMidAngle);
        cachedWheelCtx.fillText(`${Math.round(yellowChance)}%`, yellowTextX, yellowTextY);
        const redMidAngle = yellowAngle + redAngle / 2;
        const redTextX = centerX + radius * 0.62 * Math.cos(redMidAngle);
        const redTextY = centerY + radius * 0.62 * Math.sin(redMidAngle);
        cachedWheelCtx.fillText(`${Math.round(redChance)}%`, redTextX, redTextY);
        cachedWheelCtx.restore();
        cachedWheelCtx.beginPath();
        cachedWheelCtx.arc(centerX, centerY, radius + 11, 0, Math.PI * 2);
        cachedWheelCtx.lineWidth = 20;
        cachedWheelCtx.strokeStyle = '#181831';
        cachedWheelCtx.stroke();
        const totalBolts = 24;
        for (let i = 0; i < totalBolts; i++) {
            let boltAngle = (i * (Math.PI * 2 / totalBolts));
            let boltX = centerX + (radius + 11) * Math.cos(boltAngle);
            let boltY = centerY + (radius + 11) * Math.sin(boltAngle);
            cachedWheelCtx.beginPath();
            cachedWheelCtx.arc(boltX, boltY, 5, 0, Math.PI * 2);
            cachedWheelCtx.fillStyle = '#CCCCCC';
            cachedWheelCtx.fill();
            cachedWheelCtx.beginPath();
            cachedWheelCtx.arc(boltX, boltY, 1.5, 0, Math.PI * 2);
            cachedWheelCtx.fillStyle = '#111116';
            cachedWheelCtx.fill();
        }
        cachedWheelCtx.beginPath();
        cachedWheelCtx.arc(centerX, centerY, 42, 0, Math.PI * 2);
        cachedWheelCtx.fillStyle = '#0f0f20';
        cachedWheelCtx.fill();
        cachedWheelCtx.beginPath();
        cachedWheelCtx.arc(centerX, centerY, 36, 0, Math.PI * 2);
        cachedWheelCtx.lineWidth = 4;
        cachedWheelCtx.strokeStyle = '#FFD700';
        cachedWheelCtx.stroke();
        cachedWheelCtx.beginPath();
        cachedWheelCtx.arc(centerX, centerY, 33, 0, Math.PI * 2);
        cachedWheelCtx.fillStyle = '#16162d';
        cachedWheelCtx.fill();
        cachedWheelCtx.save();
        cachedWheelCtx.font = 'bold 22px "Arial Black", sans-serif';
        cachedWheelCtx.textAlign = 'center';
        cachedWheelCtx.textBaseline = 'middle';
        let textGrad = cachedWheelCtx.createLinearGradient(centerX, centerY - 12, centerX, centerY + 12);
        textGrad.addColorStop(0, '#FFFFFF');
        textGrad.addColorStop(0.5, '#F1C40F');
        textGrad.addColorStop(1, '#F39C12');
        cachedWheelCtx.fillStyle = textGrad;
        cachedWheelCtx.fillText('WG', centerX, centerY + 2);
        cachedWheelCtx.restore();
        isWheelCached = true;
        console.log('🚀 Графика колеса Фортуны успешно закэширована в памяти.');
    }

    function preCacheWheel() {
        if (isPreCaching || isWheelCached) return;
        isPreCaching = true;
        if (!cachedWheelCtx) {
            cachedWheelCanvas = document.createElement('canvas');
            cachedWheelCtx = cachedWheelCanvas.getContext('2d');
        }
        setTimeout(() => {
            if (wheelCanvas) {
                cacheWheelGraphics(50, 50);
                console.log('🎡 Предварительное кэширование колеса выполнено');
            }
            isPreCaching = false;
        }, 50);
    }

    function drawWheel() {
        if (!wheelCtx || !wheelCanvas || !isWheelCached) return;
        const size = wheelCanvas.width;
        const centerX = size / 2;
        const centerY = size / 2;
        wheelCtx.clearRect(0, 0, size, size);
        wheelCtx.save();
        wheelCtx.translate(centerX, centerY);
        wheelCtx.rotate(wheelRotation);
        wheelCtx.drawImage(cachedWheelCanvas, -centerX, -centerY);
        wheelCtx.restore();
    }

    function animateWheel(timestamp) {
        if (!wheelStartTime) {
            wheelStartTime = timestamp;
            requestAnimationFrame(animateWheel);
            return;
        }
        const elapsed = timestamp - wheelStartTime;
        let progress = Math.min(1, elapsed / wheelDuration);
        let easeProgress;
        if (progress < 0.15) {
            easeProgress = Math.pow(progress / 0.15, 1.5) * 0.12;
        } else {
            const normalizedProgress = (progress - 0.15) / 0.85;
            easeProgress = 0.12 + (1 - Math.pow(1 - normalizedProgress, 4)) * 0.88;
        }
        wheelRotation = wheelTargetRotation * easeProgress;
        drawWheel();
        if (progress < 1) {
            const fortuneModal = document.getElementById('fortuneModal');
            if (fortuneModal && fortuneModal.classList.contains('active')) {
                wheelAnimationId = requestAnimationFrame(animateWheel);
            } else {
                if (wheelAnimationId) {
                    cancelAnimationFrame(wheelAnimationId);
                    wheelAnimationId = null;
                }
                window.isFortuneRoundEnding = false;
                const overlay = document.getElementById('wheelOverlay');
                if (overlay) overlay.classList.remove('active');
                return;
            }
        } else {
            cancelAnimationFrame(wheelAnimationId);
            wheelAnimationId = null;
            window.isFortuneRoundEnding = false;
            if (wheelCanvas) wheelCanvas.style.transform = 'none';
            const winnerSide = wheelWinner;
            const winnerName = winnerSide === 'yellow' ? 'Жёлтые 🟡' : 'Красные 🔴';
            const userSide = wheelPrizes?.userBetTeam || null;
            const userBet = wheelPrizes?.userBetAmount || 0;
            const yellowPool = wheelPrizes?.yellowTotalPool || 0;
            const redPool = wheelPrizes?.redTotalPool || 0;
            const totalPool = yellowPool + redPool;
            let winAmount = 0;
            let loseAmount = 0;
            if (userSide && userBet > 0) {
                if (userSide === winnerSide && totalPool > 0) {
                    const winnerPool = winnerSide === 'yellow' ? yellowPool : redPool;
                    if (winnerPool > 0) {
                        const odds = totalPool / winnerPool;
                        winAmount = Math.round(userBet * odds * 100) / 100;
                    } else {
                        winAmount = userBet;
                    }
                } else if (userSide !== winnerSide && userBet > 0) {
                    loseAmount = userBet;
                }
            }
            const resultDiv = document.getElementById('wheelResult');
            if (resultDiv) {
                if (!userSide || userBet === 0) {
                    resultDiv.innerHTML = `🔔 Раунд завершён!<br>Победила команда <b>${winnerName}</b>!<br><span style="font-size:0.7rem;">Вы не участвовали в этом раунде.</span>`;
                } else if (userSide === winnerSide && winAmount > 0) {
                    resultDiv.innerHTML = `🎉 <b>ПОЗДРАВЛЯЕМ, ВЫ ВЫИГРАЛИ!</b> 🎉<br><br>
                        🟡 Команда <b>${winnerName}</b> победила!<br><br>
                        💰 <span style="font-size:1.2rem; color:#FFD700;">+${winAmount.toFixed(2)} WG</span><br>
                        📊 Ваша ставка: ${userBet} WG<br>
                        🎲 Коэффициент: ~${(winAmount / userBet).toFixed(2)}x`;
                } else if (userSide !== winnerSide && loseAmount > 0) {
                    resultDiv.innerHTML = `📉 <b>К сожалению, вы проиграли...</b><br><br>
                        🔴 Победила команда ${winnerName}<br><br>
                        💔 Потеряно: <span style="color:#f44336;">${loseAmount} WG</span><br>
                        🍀 В следующий раз точно повезёт!`;
                } else {
                    resultDiv.innerHTML = `🔔 Раунд завершён!<br>Победила команда <b>${winnerName}</b>!`;
                }
                resultDiv.classList.add('show');
            }
            const closeBtn = document.getElementById('wheelCloseBtn');
            if (closeBtn) {
                closeBtn.innerText = "Закрыть";
                closeBtn.classList.add('show');
            }
            if (typeof loadFortuneData === 'function') setTimeout(() => loadFortuneData(), 500);
            if (typeof loadFortuneHistory === 'function') setTimeout(() => loadFortuneHistory(), 1000);
            if (typeof syncData === 'function') setTimeout(() => syncData(true), 1500);
        }
    }

    function startWheelAnimation(winnerTeam, yellowPool, redPool, sectorFactor, userBetTeam = null, userBetAmount = 0) {
        window.isFortuneRoundEnding = true;
        const total = yellowPool + redPool;
        wheelPrizes = {
            yellowTotalPool: yellowPool,
            redTotalPool: redPool,
            userBetTeam: userBetTeam,
            userBetAmount: userBetAmount
        };
        let yellowChance = 50;
        let redChance = 50;
        if (total > 0) {
            yellowChance = (yellowPool / total) * 100;
            redChance = (redPool / total) * 100;
            if (yellowPool > 0 && redPool === 0) { yellowChance = 100; redChance = 0; }
            if (redPool > 0 && yellowPool === 0) { yellowChance = 0; redChance = 100; }
        }
        wheelWinner = winnerTeam;
        cacheWheelGraphics(yellowChance, redChance);
        if (wheelCanvas) {
            wheelCanvas.style.willChange = 'transform';
            wheelCanvas.style.transform = 'translateZ(0)';
        }
        const factor = (sectorFactor !== undefined && sectorFactor !== null) ? sectorFactor : 0.5;
        let targetSegmentAngle;
        if (winnerTeam === 'yellow') {
            targetSegmentAngle = (yellowChance / 100) * Math.PI * 2 * factor;
        } else {
            targetSegmentAngle = (yellowChance / 100) * Math.PI * 2 + (redChance / 100) * Math.PI * 2 * factor;
        }
        const fullRotations = fullRotationsCount * Math.PI * 2;
        wheelTargetRotation = fullRotations + (Math.PI * 1.5 - targetSegmentAngle);
        if (wheelAnimationId) cancelAnimationFrame(wheelAnimationId);
        wheelStartTime = 0;
        wheelRotation = 0;
        const fortuneModal = document.getElementById('fortuneModal');
        if (fortuneModal && fortuneModal.classList.contains('active')) {
            const overlay = document.getElementById('wheelOverlay');
            if (overlay) overlay.classList.add('active');
            const closeBtn = document.getElementById('wheelCloseBtn');
            if (closeBtn) closeBtn.classList.remove('show');
            const resultDiv = document.getElementById('wheelResult');
            if (resultDiv) resultDiv.classList.remove('show');
            requestAnimationFrame(animateWheel);
        } else {
            console.log('🎡 Колесо не показано (Фортуна закрыта)');
            window.isFortuneRoundEnding = false;
            if (typeof loadFortuneData === 'function') loadFortuneData();
            if (typeof syncData === 'function') syncData(true);
        }
    }

    const wheelCloseBtn = document.getElementById('wheelCloseBtn');
    if (wheelCloseBtn) {
        wheelCloseBtn.addEventListener('click', () => {
            const overlay = document.getElementById('wheelOverlay');
            if (overlay) overlay.classList.remove('active');
            if (typeof window.isFortuneRoundEnding !== 'undefined') {
                window.isFortuneRoundEnding = false;
            }
        });
    }

    const originalEndFortuneRound = endFortuneRound;
    window.endFortuneRound = async function() {
        try {
            const response = await fetch('/api/fortune/end_round', { method: 'POST' });
            const data = await response.json();
            if (data.success && data.winner) {
                const yellowPool = data.yellowPool !== undefined ? data.yellowPool : (fortuneData?.yellowPool || 0);
                const redPool = data.redPool !== undefined ? data.redPool : (fortuneData?.redPool || 0);
                const factor = data.sector_factor !== undefined ? data.sector_factor : 0.5;
                let userBetTeam = null;
                let userBetAmount = 0;
                try {
                    const betResponse = await fetch('/api/fortune/user_total_bet', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: userId })
                    });
                    const betData = await betResponse.json();
                    if (betData.success) {
                        userBetTeam = betData.team;
                        userBetAmount = betData.amount || 0;
                        console.log('✅ Загружена ставка пользователя в админ-форсировании:', userBetTeam, userBetAmount);
                    }
                } catch(e) {
                    console.error('Ошибка загрузки ставки:', e);
                }
                startWheelAnimation(data.winner, yellowPool, redPool, factor, userBetTeam, userBetAmount);
                showToast('🎡 Колесо Фортуны запущено!', 'info');
            } else if (data.success && data.winner === 'refund') {
                showToast('⚖️ Ставки были только на одной команде — ставки возвращены', 'info');
                if (typeof loadFortuneData === 'function') loadFortuneData();
            } else {
                showToast(data.message || 'Раунд завершён', 'info');
                if (typeof loadFortuneData === 'function') loadFortuneData();
            }
        } catch(e) {
            console.error('End round error:', e);
            if (typeof originalEndFortuneRound === 'function') originalEndFortuneRound();
        }
    };
