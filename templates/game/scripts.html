function startContestTimer() {
    if (contestTimerInterval) clearInterval(contestTimerInterval);

    const endTime = getContestEndDate().getTime();

    function updateTimer() {
        const now = getNowMSK().getTime();
        let remaining = Math.max(0, endTime - now);

        if (remaining <= 0) {
            clearInterval(contestTimerInterval);
            contestTimerInterval = null;
            const timerEl = document.getElementById('contestTimer');
            if (timerEl) timerEl.innerText = '00:00:00';
            return;
        }

        const hours = Math.floor(remaining / (3600 * 1000));
        const minutes = Math.floor((remaining % (3600 * 1000)) / (60 * 1000));
        const seconds = Math.floor((remaining % (60 * 1000)) / 1000);

        const timerEl = document.getElementById('contestTimer');
        if (timerEl) {
            timerEl.innerText = `${hours.toString().padStart(3, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        const totalSeconds = CONTEST_DURATION_HOURS * 3600;
        const elapsedSeconds = (now - getContestStartDate().getTime()) / 1000;
        const percent = Math.max(0, Math.min(100, (elapsedSeconds / totalSeconds) * 100));
        const barFill = document.getElementById('contestTimerBar');
        if (barFill) barFill.style.width = percent + '%';
    }

    updateTimer();
    contestTimerInterval = setInterval(updateTimer, 1000);
}

async function loadContestReferralsData() {
    try {
        const res = await fetch('/api/get_referrals', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId })
        });
        const data = await res.json();

        const allReferrals = data.referrals || [];
        const contestStart = getContestStartDate();

        console.log('📅 Конкурс начался (МСК):', contestStart.toLocaleString());
        console.log('👥 Всего рефералов:', allReferrals.length);

        // Фильтруем только новых рефералов (после даты старта)
        const newReferrals = [];
        for (const ref of allReferrals) {
            const refDate = new Date(ref.date);
            const refDateMSK = new Date(refDate.getTime() + (3 * 60 * 60 * 1000));
            if (refDateMSK >= contestStart) {
                console.log(`✅ Новый реферал: ${ref.username} — ${ref.total_clicks} кликов`);
                newReferrals.push(ref);
            } else {
                console.log(`❌ Старый реферал (игнор): ${ref.username}`);
            }
        }

        contestNewReferrals = newReferrals;
        updateReferralsList(contestNewReferrals);

        // ========== ГЛАВНОЕ: считаем ТОЛЬКО выполнивших условие (300+ кликов) ==========
        let completedCount = 0;
        for (const ref of newReferrals) {
            const clicks = ref.total_clicks || 0;
            if (clicks >= 300) {
                completedCount++;
                console.log(`   ✅ ${ref.username} ВЫПОЛНИЛ условие (${clicks}/300)`);
            } else {
                console.log(`   ⏳ ${ref.username} ещё не выполнил (${clicks}/300)`);
            }
        }

        // ========== БИЛЕТЫ: 1 билет за каждые 3 ВЫПОЛНЕННЫХ реферала ==========
        contestCompletedReferrals = completedCount;
        contestTicketsCount = Math.floor(completedCount / 3);
        contestProgressRemainder = completedCount % 3;

        console.log(`📊 ВСЕГО выполнено рефералов: ${completedCount}`);
        console.log(`🎫 Получено билетов: ${contestTicketsCount}`);
        console.log(`📈 Осталось до следующего билета: ${contestProgressRemainder}/3`);

        saveContestData();

        // Обновление UI
        const qEl = document.getElementById('contestReferralsCount');
        if (qEl) qEl.innerText = contestProgressRemainder;

        const tEl = document.getElementById('contestTicketsCount');
        if (tEl) tEl.innerText = contestTicketsCount;

        const progressPercent = Math.min(100, (contestProgressRemainder / 3) * 100);
        const pFill = document.getElementById('contestProgressFill');
        if (pFill) pFill.style.width = progressPercent + '%';

        const pText = document.getElementById('contestProgressText');
        if (pText) {
            const needed = 3 - contestProgressRemainder;
            if (completedCount === 0) {
                pText.innerText = `0 / 3 рефералов (нужно ещё 3)`;
            } else if (contestProgressRemainder === 0) {
                pText.innerText = `${contestProgressRemainder} / 3 рефералов (готово к следующему билету!)`;
            } else {
                pText.innerText = `${contestProgressRemainder} / 3 рефералов (нужно ещё ${needed})`;
            }
        }

        const badge = document.getElementById('contestReferralsCountBadge');
        if (badge) badge.innerText = newReferrals.length;

    } catch(e) {
        console.error('❌ Ошибка загрузки рефералов:', e);
    }
}

async function loadContestWinnersList() {
    const container = document.getElementById('contestWinnersList');
    if (!container) return;

    container.innerHTML = '<div class="empty-state">Загрузка...</div>';

    try {
        const res = await fetch('/api/contest/leaderboard');
        const data = await res.json();

        if (!data.success || !data.leaderboard || data.leaderboard.length === 0) {
            container.innerHTML = '<div class="empty-state">😢 Пока нет участников конкурса</div>';
            return;
        }

        let html = '';
        for (const player of data.leaderboard) {
            const avatarHtml = player.avatar_url ? `<img src="${player.avatar_url}">` : '👤';

            let rankDisplay = '';
            if (player.rank === 1) rankDisplay = '🥇';
            else if (player.rank === 2) rankDisplay = '🥈';
            else if (player.rank === 3) rankDisplay = '🥉';
            else rankDisplay = `${player.rank}`;

            const isQualified = player.new_referrals >= 3;
            const statusText = isQualified ? 'Участник' : `${player.new_referrals}/3`;
            const badgeClass = isQualified ? 'completed' : '';

            html += `
                <div class="winner-item" onclick="openPlayerProfile(${player.user_id}, 0)">
                    <div class="winner-rank" style="min-width: 45px; font-size: 1.1rem; font-weight: 700; color: #FFD700;">${rankDisplay}</div>
                    <div class="winner-avatar">${avatarHtml}</div>
                    <div class="winner-info">
                        <div class="winner-name">
                            ${escapeHtml(player.username)}
                            <span class="winner-badge ${badgeClass}">${statusText}</span>
                            ${player.role === 'founder' ? '<span class="role-badge founder" style="font-size:0.55rem; padding:2px 6px;">👑</span>' : ''}
                            ${player.role === 'legend' ? '<span class="role-badge legend" style="font-size:0.55rem; padding:2px 6px;">👑</span>' : ''}
                        </div>
                        <div class="winner-stats">
                            <span>🎫 ${player.tickets} билетов</span>
                            <span>👥 ${player.new_referrals} рефералов</span>
                        </div>
                    </div>
                    <div style="font-size: 1.2rem; color: #FFD700;">→</div>
                </div>
            `;
        }
        container.innerHTML = html;

    } catch(e) {
        console.error('Error loading contest leaderboard:', e);
        container.innerHTML = '<div class="empty-state">❌ Ошибка загрузки топа</div>';
    }
}

async function checkPaydayStatus() {
    try {
        const res = await fetch('/api/payday/status');
        const data = await res.json();

        window.paydayMultiplier = data.is_active ? data.multiplier : 1;
        window.isPaydayActive = data.is_active;

        const indicator = document.getElementById('paydayIndicator');
        const multiplierEl = document.getElementById('paydayMultiplierIndicator');
        const earningsInfo = document.querySelector('.earnings-info');
        const energyAdCards = document.querySelectorAll('.ad-card');
        const upgradeCards = document.querySelectorAll('.upgrade-card');
        const lotteryLPBalance = document.getElementById('lotteryLPBalance');

        if (data.is_active && data.multiplier > 1.0) {
            // Показываем индикатор
            if (indicator) {
                indicator.style.display = 'block';
                if (multiplierEl) multiplierEl.innerText = data.multiplier;
            }

            // Меняем цвет заработка
            if (earningsInfo) {
                earningsInfo.style.border = '2px solid #FF6B00';
                earningsInfo.style.background = 'rgba(255,107,0,0.15)';
                const earningSpan = earningsInfo.querySelector('strong');
                if (earningSpan) {
                    earningSpan.style.color = '#FF6B00';
                    earningSpan.style.fontSize = '1.2em';
                }
            }

            // ========== ОБНОВЛЯЕМ РЕКЛАМНЫЕ КАРТОЧКИ ==========
            energyAdCards.forEach(card => {
                const adBtn = card.querySelector('.ad-btn');
                const desc = card.querySelector('.ad-desc');

                // Добавляем бейдж с множителем
                if (adBtn && !card.dataset.paydayApplied) {
                    const boostText = document.createElement('span');
                    boostText.style.cssText = 'color: #FF6B00; font-weight: 700; margin-left: 8px;';
                    boostText.innerText = `🔥 x${data.multiplier}`;
                    adBtn.appendChild(boostText);
                    card.dataset.paydayApplied = 'true';
                }

                // Добавляем информацию о сокращённом кулдауне
                if (desc && !card.dataset.cooldownApplied) {
                    // Определяем тип рекламы по тексту
                    const descText = desc.innerText || '';
                    let cooldownText = '';

                    if (descText.includes('+150 энергии')) {
                        cooldownText = '⏱️ Кулдаун: 2 мин (было 5)';
                    } else if (descText.includes('+1 к макс. энергии')) {
                        cooldownText = '⏱️ Кулдаун: 2 мин (было 10)';
                    }

                    if (cooldownText) {
                        const cooldownInfo = document.createElement('div');
                        cooldownInfo.style.cssText = 'color: #22c55e; font-size: 0.6rem; margin-top: 2px; font-weight: 600;';
                        cooldownInfo.innerText = cooldownText;
                        desc.appendChild(cooldownInfo);
                        card.dataset.cooldownApplied = 'true';
                    }
                }

                card.style.border = '2px solid #FF6B00';
                card.style.background = 'rgba(255,107,0,0.08)';
            });

            // Добавляем бейдж на карточки улучшений
            upgradeCards.forEach(card => {
                if (!card.dataset.paydayApplied) {
                    const priceDiv = card.querySelector('.upgrade-price');
                    if (priceDiv) {
                        const boostBadge = document.createElement('span');
                        boostBadge.style.cssText = 'color: #FF6B00; font-weight: 700; margin-left: 8px; font-size: 0.7rem;';
                        boostBadge.innerText = `🔥 x${data.multiplier}`;
                        priceDiv.appendChild(boostBadge);
                    }
                    card.dataset.paydayApplied = 'true';
                }
                card.style.border = '2px solid #FF6B00';
                card.style.background = 'rgba(255,107,0,0.08)';
            });

            // Обновляем LP баланс в лотерее (если есть)
            if (lotteryLPBalance) {
                lotteryLPBalance.style.color = '#FF6B00';
                lotteryLPBalance.style.fontWeight = '800';
            }

            // Обновляем энергию в хедере
            const energyHeader = document.querySelector('.stat-badge');
            if (energyHeader) {
                energyHeader.style.border = '2px solid #FF6B00';
                energyHeader.style.background = 'rgba(255,107,0,0.15)';
            }

        } else {
            // Скрываем индикатор
            if (indicator) indicator.style.display = 'none';

            // Возвращаем обычный вид
            if (earningsInfo) {
                earningsInfo.style.border = 'none';
                earningsInfo.style.background = 'rgba(255,215,0,0.08)';
                const earningSpan = earningsInfo.querySelector('strong');
                if (earningSpan) {
                    earningSpan.style.color = '';
                    earningSpan.style.fontSize = '';
                }
            }

            // Убираем бейджи и информацию о кулдауне с рекламных карточек
            energyAdCards.forEach(card => {
                card.style.border = 'none';
                card.style.background = '';

                // Убираем бейдж множителя
                const boostText = card.querySelector('.ad-btn span:last-child');
                if (boostText && boostText.innerText.includes('🔥')) {
                    boostText.remove();
                }

                // Убираем информацию о кулдауне
                const cooldownInfo = card.querySelector('.ad-desc div:last-child');
                if (cooldownInfo && cooldownInfo.innerText.includes('Кулдаун')) {
                    cooldownInfo.remove();
                }

                card.dataset.paydayApplied = '';
                card.dataset.cooldownApplied = '';
            });

            // Убираем бейджи с улучшений
            upgradeCards.forEach(card => {
                card.style.border = 'none';
                card.style.background = '';
                const boostBadge = card.querySelector('.upgrade-price span:last-child');
                if (boostBadge && boostBadge.innerText.includes('🔥')) {
                    boostBadge.remove();
                }
                card.dataset.paydayApplied = '';
            });

            // Возвращаем обычный вид LP баланса
            if (lotteryLPBalance) {
                lotteryLPBalance.style.color = '';
                lotteryLPBalance.style.fontWeight = '';
            }

            // Возвращаем обычный вид энергии
            const energyHeader = document.querySelector('.stat-badge');
            if (energyHeader) {
                energyHeader.style.border = 'none';
                energyHeader.style.background = '';
            }
        }
    } catch(e) {
        console.error('PayDay check error:', e);
    }
}

setInterval(checkPaydayStatus, 10000);
checkPaydayStatus();

let currentLanguage = 'ru';

// ===== ЗАГРУЗКА ЯЗЫКА =====
// ===== ЗАГРУЗКА ЯЗЫКА =====
async function loadLanguageSettings() {
    try {
        console.log('🔍 Загрузка языка...');

        // 1️⃣ СНАЧАЛА проверяем, есть ли сохранённый язык в БД
        const res = await fetch('/api/get_settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId })
        });
        const settings = await res.json();

        // 2️⃣ ЕСЛИ язык уже сохранён в БД — ИСПОЛЬЗУЕМ ЕГО (игрок сам выбрал)
        if (settings.language) {
            console.log('📂 Загружаем язык из настроек (выбор игрока):', settings.language);
            currentLanguage = settings.language;
            applyLanguage(settings.language);

            // Обновляем кнопки
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === settings.language);
            });
            return;
        }

        // 3️⃣ ЕСЛИ в БД НЕТ языка — пробуем взять из Telegram (первый заход)
        let tgLang = null;

        if (window.Telegram && window.Telegram.WebApp) {
            const user = window.Telegram.WebApp.initDataUnsafe?.user;
            if (user && user.language_code) {
                tgLang = user.language_code.startsWith('en') ? 'en' : 'ru';
                console.log('🌍 Язык из Telegram (первый заход):', tgLang);
            } else if (window.Telegram.WebApp.language_code) {
                tgLang = window.Telegram.WebApp.language_code.startsWith('en') ? 'en' : 'ru';
                console.log('🌍 Язык из Telegram (первый заход):', tgLang);
            }
        }

        // 4️⃣ Если язык из Telegram есть — используем его и СОХРАНЯЕМ в БД
        if (tgLang) {
            console.log('✅ Используем язык из Telegram и сохраняем в БД:', tgLang);
            currentLanguage = tgLang;
            applyLanguage(tgLang);

            // Сохраняем в БД
            await fetch('/api/update_settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: userId,
                    setting: 'language',
                    value: tgLang
                })
            });
            console.log('💾 Язык сохранён в БД:', tgLang);

            // Обновляем кнопки
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === tgLang);
            });
            return;
        }

        // 5️⃣ Если ничего нет — ставим русский по умолчанию
        console.log('🌍 Язык не найден, ставим русский по умолчанию');
        applyLanguage('ru');

        // Сохраняем русский в БД
        await fetch('/api/update_settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: userId,
                setting: 'language',
                value: 'ru'
            })
        });

    } catch(e) {
        console.error('❌ Error loading language:', e);
        applyLanguage('ru');
    }
}

// ===== ПРИМЕНЕНИЕ ЯЗЫКА =====
function applyLanguage(lang) {
    currentLanguage = lang;
    const t = TRANSLATIONS[lang] || TRANSLATIONS.ru;

    // Обновляем все элементы с data-lang
    document.querySelectorAll('[data-lang]').forEach(el => {
        const key = el.dataset.lang;
        if (t[key] !== undefined) {
            // Если внутри есть дочерние элементы с текстом, заменяем только текст
            const children = el.children;
            if (children.length > 0 && el.textContent.trim() === children[0].textContent.trim()) {
                // Если есть дочерние элементы, обновляем только текстовые ноды
                const textNode = el.childNodes[0];
                if (textNode && textNode.nodeType === 3) {
                    textNode.textContent = t[key] + ' ';
                }
            } else {
                // Иначе заменяем весь текст
                el.textContent = t[key];
            }
        }
    });

    // Обновляем все элементы с data-lang-attr (для атрибутов)
    document.querySelectorAll('[data-lang-attr]').forEach(el => {
        const key = el.dataset.langAttr;
        const attr = el.dataset.langAttrName || 'placeholder';
        if (t[key] !== undefined) {
            el.setAttribute(attr, t[key]);
        }
    });

    // Обновляем кнопки языка
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
    });

    // Сохраняем в localStorage для быстрого доступа
    localStorage.setItem('weregood_lang', lang);
}

// ===== ПЕРЕКЛЮЧЕНИЕ ЯЗЫКА =====
async function setLanguage(lang) {
    if (lang === currentLanguage) return;

    console.log('🔄 Игрок переключил язык на:', lang);
    currentLanguage = lang;
    applyLanguage(lang);

    // Сохраняем в БД (игрок выбрал сам)
    try {
        await fetch('/api/update_settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: userId,
                setting: 'language',
                value: lang
            })
        });
        console.log('💾 Язык сохранён в БД (выбор игрока):', lang);
        showToast(lang === 'ru' ? '✅ Язык изменён на Русский' : '✅ Language changed to English', 'success');
    } catch(e) {
        console.error('Error saving language:', e);
    }
}

// ===== ДОБАВЛЯЕМ АТРИБУТЫ ДЛЯ ПЕРЕВОДА В ДИНАМИЧЕСКИЕ ЭЛЕМЕНТЫ =====
// Эта функция вызывается при создании динамических элементов
function translateElement(el, key) {
    if (!el) return;
    el.setAttribute('data-lang', key);
    const t = TRANSLATIONS[currentLanguage] || TRANSLATIONS.ru;
    if (t[key] !== undefined) {
        el.textContent = t[key];
    }
}

// Загружаем язык при старте
setTimeout(loadLanguageSettings, 500);
