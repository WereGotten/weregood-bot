<script>
    // ==================== ИНИЦИАЛИЗАЦИЯ С ПРАВИЛЬНОЙ ЛОГИКОЙ ====================
    let tg = window.Telegram?.WebApp;
    let user = tg?.initDataUnsafe?.user;

    let savedUserId = sessionStorage.getItem('weregood_user_id');
    let userId = null;
    let isAuthError = false;

    // ПРАВИЛЬНАЯ ЛОГИКА ПОЛУЧЕНИЯ ID - БЕЗ ДЕФОЛТНОГО ЗНАЧЕНИЯ!
    if (user && user.id && user.id > 0) {
        // Реальный ID из Telegram (минимальный ID в Telegram начинается с 100000000)
        if (user.id.toString().length >= 9) {
            userId = user.id;
            sessionStorage.setItem('weregood_user_id', userId);
            console.log('✅ ID получен из Telegram:', userId);
        } else {
            console.warn('⚠️ Подозрительный ID из Telegram:', user.id);
            userId = user.id;
        }
    } else if (savedUserId && savedUserId !== 'null' && parseInt(savedUserId) > 0) {
        // Восстанавливаем из sessionStorage
        userId = parseInt(savedUserId);
        console.log('✅ ID восстановлен из sessionStorage:', userId);
    }

    // ЕСЛИ ID НЕ ПОЛУЧЕН - ПОКАЗЫВАЕМ ОШИБКУ, А НЕ ИСПОЛЬЗУЕМ ДЕФОЛТ!
    if (!userId || userId === 12345678) {
        isAuthError = true;
        console.error('❌ КРИТИЧЕСКАЯ ОШИБКА: Невозможно определить пользователя!');

        // Создаём красивое сообщение об ошибке
        const errorHtml = `
            <div id="authErrorOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:20px;">
                <div style="background:linear-gradient(145deg,#1a1a2e,#0f0f20);border-radius:32px;padding:32px;max-width:350px;border:2px solid #f44336;">
                    <div style="font-size:48px;margin-bottom:16px;">❌</div>
                    <h2 style="color:#f44336;margin-bottom:12px;">Ошибка авторизации</h2>
                    <p style="color:rgba(255,255,255,0.7);margin-bottom:24px;font-size:14px;">
                        Не удалось определить ваш аккаунт.<br>
                        Пожалуйста, перезапустите игру или привяжите аккаунт вручную.
                    </p>
                    <button onclick="window.forceBindAccount()" style="background:linear-gradient(135deg,#FFD700,#FFA500);border:none;padding:12px 24px;border-radius:40px;font-weight:700;color:#0a0a1a;cursor:pointer;width:100%;margin-bottom:12px;">
                        🔗 Привязать аккаунт
                    </button>
                    <button onclick="location.reload()" style="background:rgba(255,255,255,0.1);border:none;padding:12px 24px;border-radius:40px;font-weight:500;color:white;cursor:pointer;width:100%;">
                        ⟳ Перезагрузить
                    </button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', errorHtml);

        // Останавливаем выполнение остального кода
        throw new Error('Authentication failed - no user ID');
    }

    let username = user ? (user.username || '') : '';
    let firstName = user ? (user.first_name || '') : '';
    let lastName = user ? (user.last_name || '') : '';
    let photoUrl = user && user.photo_url ? user.photo_url : '';
    let chatId = userId;
    let displayName = firstName || username || 'Игрок';

    // ФЛАГИ ДЛЯ СТИРАНИЯ - ПРЕДОТВРАЩАЕМ ПЕРЕЗАГРУЗКУ БИЛЕТОВ
    let isScratchingActive = false;
    let scratchTimeout = null;
    let pendingRefreshTimeout = null;

    window.forceBindAccount = async function() {
        // Убираем оверлей ошибки, если он есть
        const errorOverlay = document.getElementById('authErrorOverlay');
        if (errorOverlay) errorOverlay.remove();

        if (!tg) {
            showToast('❌ Telegram WebApp не доступен', 'error');
            return;
        }
        tg.expand();
        const freshUser = tg.initDataUnsafe?.user;
        if (freshUser && freshUser.id && freshUser.id > 0) {
            const newUserId = freshUser.id;
            if (confirm(`⚠️ Обнаружен ваш аккаунт (ID: ${newUserId}).\n\nПривязать его к игре? Весь ваш прогресс сохранится.`)) {
                userId = newUserId;
                sessionStorage.setItem('weregood_user_id', userId);
                username = freshUser.username || '';
                firstName = freshUser.first_name || '';
                lastName = freshUser.last_name || '';
                photoUrl = freshUser.photo_url || '';
                displayName = firstName || username || 'Игрок';
                await autoRegister();
                await syncData(true);
                showToast('✅ Аккаунт привязан!', 'success');
                setTimeout(() => location.reload(), 1500);
            }
        } else {
            showToast('❌ Не удалось получить данные аккаунта. Попробуйте перезапустить Telegram.', 'error');
        }
    };

    if (sessionStorage.getItem('weregood_display_name')) {
        displayName = sessionStorage.getItem('weregood_display_name');
    }

    let currentTickets = [];
    let socket = null;
    let isDrawn = false;
    let winningNumbers = [];
    let timerInterval = null;
    let currentTicketIndex = 0;

    let localWG = 0;
    let localLP = 0;
    let localEnergy = 500;
    let localClicks = 0;
    let localEarning = 0.01;
    let localUSDT = 0;
    let localWins = 0;
    let localRole = 'player';
    let localStars = 0;
    let localMaxEnergy = 500;
    let localEnergyUpgrades = 0;
    let localHideFromTop = false;
    let upgradeCounts = {1: 0, 2: 0, 3: 0};
    let upgradeCosts = {1: 1.5, 2: 10, 3: 70};
    let scratchProgress = new Map();
    let availablePrefixes = [];
    let dailyData = null;
    let dailyTimerInterval = null;

    let isUpdatingStatus = false;
    let lastStatusUpdate = 0;
    let isUpdatingLottery = false;
    let lastLotteryUpdate = 0;
    const STATUS_UPDATE_DELAY = 3000;
    const LOTTERY_UPDATE_DELAY = 5000;

    let dataCache = { status: null, lottery: null, leaderboard: null };
    const dailyRewardsList = {
        1: { reward: "15 WG" },
        2: { reward: "50 WG" },
        3: { reward: "+10 ⚡" },
        4: { reward: "10 LP" },
        5: { reward: "+15 ⚡" },
        6: { reward: "150 WG" },
        7: { reward: "20 LP" }
    };

    function showComingSoon() {
        openGamepad();
    }

    function showToast(msg, type = 'info') {
        let toast = document.getElementById('toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'toast';
            toast.className = 'toast';
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.className = `toast ${type} show`;
        setTimeout(() => toast.className = 'toast', 1500);
    }

    function playPurchaseSound() {
        const soundsToggle = document.getElementById('soundsToggle');
        const soundEnabled = soundsToggle ? soundsToggle.checked : true;
        const purchaseSound = document.getElementById('purchaseSound');
        if (purchaseSound && soundEnabled) {
            purchaseSound.currentTime = 0;
            purchaseSound.play().catch(e => console.log('Purchase sound error:', e));
        }
    }

    function playErrorSound() {
        const soundsToggle = document.getElementById('soundsToggle');
        const soundEnabled = soundsToggle ? soundsToggle.checked : true;
        const errorSound = document.getElementById('errorSound');
        if (errorSound && soundEnabled) {
            errorSound.currentTime = 0;
            errorSound.play().catch(e => console.log('Error sound error:', e));
        }
    }

    function playClickFeedback() {
        const vibrationToggle = document.getElementById('vibrationToggle');
        const vibrationEnabled = vibrationToggle ? vibrationToggle.checked : true;
        const soundsToggle = document.getElementById('soundsToggle');
        const soundEnabled = soundsToggle ? soundsToggle.checked : true;
        const clickSound = document.getElementById('clickSound');
        if (navigator.vibrate && vibrationEnabled) navigator.vibrate(15);
        if (clickSound && soundEnabled) {
            clickSound.currentTime = 0;
            clickSound.play().catch(e => console.log('Audio play error:', e));
        }
    }

    function playLpDropSound() {
        const soundsToggle = document.getElementById('soundsToggle');
        const soundEnabled = soundsToggle ? soundsToggle.checked : true;
        const lpDropSound = document.getElementById('lpDropSound');
        if (lpDropSound && soundEnabled) {
            lpDropSound.currentTime = 0;
            lpDropSound.volume = 0.5;
            lpDropSound.play().catch(e => console.log('LP drop sound error:', e));
        }
    }

    function playNavSound() {
        const soundsToggle = document.getElementById('soundsToggle');
        const soundEnabled = soundsToggle ? soundsToggle.checked : true;
        const navSound = document.getElementById('navSound');
        if (navSound && soundEnabled) {
            navSound.currentTime = 0;
            navSound.volume = 0.3;
            navSound.play().catch(e => console.log('Nav sound error:', e));
        }
    }

    function playSettingsSound() {
        const soundsToggle = document.getElementById('soundsToggle');
        const soundEnabled = soundsToggle ? soundsToggle.checked : true;
        const settingsSound = document.getElementById('settingsSound');
        if (settingsSound && soundEnabled) {
            settingsSound.currentTime = 0;
            settingsSound.volume = 0.3;
            settingsSound.play().catch(e => console.log('Settings sound error:', e));
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getUpgradeCost(upgradeId, currentCount) {
        const config = {
            1: { baseCost: 1.5, bonus: 0.01, name: "Новичок" },
            2: { baseCost: 10, bonus: 0.03, name: "Профессионал" },
            3: { baseCost: 70, bonus: 0.07, name: "Мастер" }
        };
        const baseCost = config[upgradeId].baseCost;
        if (currentCount === 0) return baseCost;
        return baseCost * Math.pow(1.65, currentCount);
    }

    function updateUI() {
        upgradeCosts[1] = getUpgradeCost(1, upgradeCounts[1] || 0);
        upgradeCosts[2] = getUpgradeCost(2, upgradeCounts[2] || 0);
        upgradeCosts[3] = getUpgradeCost(3, upgradeCounts[3] || 0);

        const wgEl = document.getElementById('wgBalance');
        if (wgEl) wgEl.innerText = localWG.toFixed(2);
        const lpEl = document.getElementById('lpBalance');
        if (lpEl) lpEl.innerText = localLP;
        const energyEl = document.getElementById('energyValue');
        if (energyEl) energyEl.innerText = localEnergy;
        const maxEnergyEl = document.getElementById('maxEnergyValue');
        if (maxEnergyEl) maxEnergyEl.innerText = localMaxEnergy;
        const energyHeaderEl = document.getElementById('energyHeader');
        if (energyHeaderEl) energyHeaderEl.innerText = localEnergy;

        let percent = (localEnergy / localMaxEnergy) * 100;
        const energyBar = document.getElementById('energyBar');
        if (energyBar) energyBar.style.width = percent + '%';

        const totalWG = document.getElementById('totalWG');
        if (totalWG) totalWG.innerText = localWG.toFixed(2);
        const totalLP = document.getElementById('totalLP');
        if (totalLP) totalLP.innerText = localLP;
        const totalWGmini = document.getElementById('totalWGmini');
        if (totalWGmini) totalWGmini.innerText = localWG.toFixed(2);
        const lotteryLPBalance = document.getElementById('lotteryLPBalance');
        if (lotteryLPBalance) lotteryLPBalance.innerText = localLP;
        const totalClicksMini = document.getElementById('totalClicksMini');
        if (totalClicksMini) totalClicksMini.innerText = localClicks;
        const profileClicks = document.getElementById('profileClicks');
        if (profileClicks) profileClicks.innerText = localClicks;
        const profileUSDT = document.getElementById('profileUSDT');
        if (profileUSDT) profileUSDT.innerText = localUSDT.toFixed(2);
        const profileWins = document.getElementById('profileWins');
        if (profileWins) profileWins.innerText = localWins;
        const earningPerClick = document.getElementById('earningPerClick');
        if (earningPerClick) earningPerClick.innerText = localEarning.toFixed(2);
        const clickAmount = document.getElementById('clickAmount');
        if (clickAmount) clickAmount.innerText = localEarning.toFixed(2);

        const totalTickets = document.getElementById('totalTickets');
        if (totalTickets) totalTickets.innerText = currentTickets.length;
        const totalTicketsMini = document.getElementById('totalTicketsMini');
        if (totalTicketsMini) totalTicketsMini.innerText = currentTickets.length;

        const upgradeCount1 = document.getElementById('upgradeCount1');
        if (upgradeCount1) upgradeCount1.innerText = upgradeCounts[1];
        const upgradeCount2 = document.getElementById('upgradeCount2');
        if (upgradeCount2) upgradeCount2.innerText = upgradeCounts[2];
        const upgradeCount3 = document.getElementById('upgradeCount3');
        if (upgradeCount3) upgradeCount3.innerText = upgradeCounts[3];
        const upgradeCost1 = document.getElementById('upgradeCost1');
        if (upgradeCost1) upgradeCost1.innerHTML = upgradeCosts[1].toFixed(2);
        const upgradeCost2 = document.getElementById('upgradeCost2');
        if (upgradeCost2) upgradeCost2.innerHTML = upgradeCosts[2].toFixed(2);
        const upgradeCost3 = document.getElementById('upgradeCost3');
        if (upgradeCost3) upgradeCost3.innerHTML = upgradeCosts[3].toFixed(2);

        const starsBalance = document.getElementById('starsBalance');
        if (starsBalance) starsBalance.innerText = localStars;
        const currentMaxEnergy = document.getElementById('currentMaxEnergy');
        if (currentMaxEnergy) currentMaxEnergy.innerText = localMaxEnergy;
        const energyUpgradeCount = document.getElementById('energyUpgradeCount');
        if (energyUpgradeCount) energyUpgradeCount.innerText = localEnergyUpgrades;
        const energyUpgradeCountProgress = document.getElementById('energyUpgradeCountProgress');
        if (energyUpgradeCountProgress) energyUpgradeCountProgress.innerText = localEnergyUpgrades;

        let upgradesLeft = Math.max(0, 15 - localEnergyUpgrades);
        const energyUpgradesLeft = document.getElementById('energyUpgradesLeft');
        if (energyUpgradesLeft) energyUpgradesLeft.innerText = upgradesLeft;

        let progressPercent = (localEnergyUpgrades / 15) * 100;
        const energyUpgradeProgressFill = document.getElementById('energyUpgradeProgressFill');
        if (energyUpgradeProgressFill) energyUpgradeProgressFill.style.width = progressPercent + '%';

        let upgradeBtn = document.getElementById('energyUpgradeBtn');
        let upgradeCard = document.getElementById('energyUpgradeCard');
        if (upgradeBtn && upgradeCard) {
            if (localEnergyUpgrades >= 15) {
                upgradeBtn.innerText = '✅ Максимум достигнут';
                upgradeBtn.disabled = true;
                upgradeBtn.classList.add('disabled');
                upgradeCard.classList.add('disabled');
            } else {
                upgradeBtn.innerHTML = '<img src="/static/star_small.png" alt="Stars" style="width: 16px; height: 16px;"> Купить за 25 звёзд';
                upgradeBtn.disabled = false;
                upgradeBtn.classList.remove('disabled');
                upgradeCard.classList.remove('disabled');
            }
        }

        const badgesContainer = document.getElementById('profileBadges');
        if (badgesContainer) {
            let badgesHtml = '';
            if (localRole === 'founder') badgesHtml += '<span class="role-badge founder">👑 ОСНОВАТЕЛЬ</span>';
            else if (localRole === 'legend') badgesHtml += '<span class="role-badge legend">👑 ЛЕГЕНДА</span>';
            else if (localRole === 'pioneer') badgesHtml += '<span class="role-badge pioneer">⭐ ПЕРВООТКРЫВАТЕЛЬ</span>';
            else badgesHtml += '<span class="role-badge player">🎮 Игрок</span>';
            badgesContainer.innerHTML = badgesHtml;
        }
    }

    function updateModalBadges(role) {
        const badgesContainer = document.getElementById('playerModalBadges');
        if (!badgesContainer) return;
        let badgesHtml = '';
        if (role === 'founder') badgesHtml += '<span class="role-badge founder">👑 ОСНОВАТЕЛЬ</span>';
        else if (role === 'pioneer') badgesHtml += '<span class="role-badge pioneer">⭐ ПЕРВООТКРЫВАТЕЛЬ</span>';
        else if (role === 'legend') badgesHtml += '<span class="role-badge legend">👑 ЛЕГЕНДА</span>';
        else badgesHtml += '<span class="role-badge player">🎮 Игрок</span>';
        badgesContainer.innerHTML = badgesHtml;
    }

    function animateClick() {
        let coin = document.getElementById('coin');
        let plus = document.getElementById('clickPlus');
        if (coin) coin.classList.add('coin-click');
        if (plus) plus.classList.add('show');
        setTimeout(() => {
            if (coin) coin.classList.remove('coin-click');
            if (plus) plus.classList.remove('show');
        }, 80);
    }

    // ========== ОПТИМИЗИРОВАННЫЙ СИНХРОНИЗАТОР ==========
    let syncInterval = null;
    let lastSyncTime = 0;
    let isSyncing = false;
    const SYNC_DELAY = 5000;

    async function syncData(force = false) {
        if (isSyncing) return;
        const now = Date.now();
        if (!force && now - lastSyncTime < SYNC_DELAY) return;
        isSyncing = true;
        lastSyncTime = now;
        try {
            const response = await fetch('/api/sync', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId }),
                signal: AbortSignal.timeout(5000)
            });
            if (!response.ok) throw new Error('Sync failed');
            const data = await response.json();
            if (!data.success || !data.status) {
                console.error('Sync error: invalid response');
                return;
            }

            // Обновляем статус игрока
            const status = data.status;
            localWG = status.wg || 0;
            localLP = status.lp || 0;
            localEnergy = status.energy || 0;
            localClicks = status.total_clicks || 0;
            localEarning = status.earning_per_click || 0.01;
            localUSDT = status.usdt || 0;
            localWins = status.wins || 0;
            localRole = status.role || 'player';
            localStars = status.stars || 0;
            localMaxEnergy = status.max_energy || 500;
            localEnergyUpgrades = status.energy_upgrades || 0;

            if (status.upgrade_counts) {
                upgradeCounts = status.upgrade_counts;
                for (let i = 1; i <= 3; i++) {
                    upgradeCosts[i] = getUpgradeCost(i, upgradeCounts[i] || 0);
                }
            }

            // ========== КРИТИЧЕСКОЕ ИСПРАВЛЕНИЕ: обновляем лотерею из data.lottery ==========
            if (data.lottery) {
                console.log('📊 Получены данные лотереи:', data.lottery);

                // Обновляем призовой фонд
                const prizePoolEl = document.getElementById('prizePool');
                if (prizePoolEl && data.lottery.prize_pool !== undefined) {
                    prizePoolEl.innerText = data.lottery.prize_pool.toFixed(2);
                }

                // Обновляем количество билетов у игрока
                if (data.lottery.user_tickets !== undefined) {
                    const ticketsCountEl = document.getElementById('ticketsCount');
                    if (ticketsCountEl) ticketsCountEl.innerText = data.lottery.user_tickets;
                    const totalTicketsEl = document.getElementById('totalTickets');
                    if (totalTicketsEl) totalTicketsEl.innerText = data.lottery.user_tickets;
                    const totalTicketsMiniEl = document.getElementById('totalTicketsMini');
                    if (totalTicketsMiniEl) totalTicketsMiniEl.innerText = data.lottery.user_tickets;
                }

                // Обновляем LP в лотерейном блоке
                const lotteryLPEl = document.getElementById('lotteryLPBalance');
                if (lotteryLPEl && data.lottery.user_lp !== undefined) {
                    lotteryLPEl.innerText = data.lottery.user_lp;
                }

                // Обновляем статус розыгрыша
                if (data.lottery.is_drawn !== undefined) {
                    isDrawn = data.lottery.is_drawn;
                    winningNumbers = data.lottery.winning_numbers || [];
                    updateDrawUI();
                }

                // Обновляем билеты ТОЛЬКО если НЕ ИДЁТ АКТИВНОЕ СТИРАНИЕ
                if (data.lottery.tickets && !isScratchingActive) {
                    currentTickets = data.lottery.tickets;
                    if (typeof updateCarousel === 'function') {
                        updateCarousel();
                    }
                    if (isDrawn && typeof updateTopPlayers === 'function') {
                        updateTopPlayers();
                    }
                } else if (data.lottery.tickets && isScratchingActive) {
                    console.log('⏳ Стирание активно, отложили обновление билетов');
                    // Откладываем обновление на 1 секунду
                    if (pendingRefreshTimeout) clearTimeout(pendingRefreshTimeout);
                    pendingRefreshTimeout = setTimeout(() => {
                        if (!isScratchingActive) {
                            currentTickets = data.lottery.tickets;
                            if (typeof updateCarousel === 'function') updateCarousel();
                            if (isDrawn && typeof updateTopPlayers === 'function') updateTopPlayers();
                        }
                        pendingRefreshTimeout = null;
                    }, 1000);
                }
            }

            if (data.leaderboard && data.leaderboard.length > 0) {
                updateLeaderboardMiniFast(data.leaderboard);
            }
            if (data.recent_players && data.recent_players.length > 0) {
                updateRecentPlayersFast(data.recent_players);
            }

            updateUI();

        } catch(e) {
            console.error('Sync error:', e);
            setTimeout(() => syncData(true), 5000);
        } finally {
            isSyncing = false;
        }
    }

    function updateLeaderboardMiniFast(leaderboardData) {
        const container = document.getElementById('leaderboardMini');
        if (!container || !leaderboardData || leaderboardData.length === 0) {
            if (container) container.innerHTML = '<div class="loading">Загрузка...</div>';
            return;
        }
        let html = '';
        for (let i = 0; i < leaderboardData.length; i++) {
            const user = leaderboardData[i];
            const avatar = (user.avatar && user.avatar !== '👤' && user.avatar !== '')
                ? `<img src="${user.avatar}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;">`
                : '👤';
            const userName = user.username || 'Игрок';
            const dailyClicks = user.daily_clicks || user.clicks || 0;
            html += `<div class="leaderboard-mini-item">
                <span class="rank">${user.rank}</span>
                <span class="avatar-mini">${avatar}</span>
                <span class="name">${escapeHtml(userName)}</span>
                <span class="clicks">${dailyClicks.toLocaleString()} кликов</span>
            </div>`;
        }
        container.innerHTML = html;
    }

    function updateRecentPlayersFast(players) {
        const container = document.getElementById('recentPlayersList');
        if (!container) return;
        if (!players || players.length === 0) {
            container.innerHTML = '<div class="empty-state">😢 Пока нет участников</div>';
            return;
        }
        let html = '';
        for (let i = 0; i < players.length; i++) {
            const p = players[i];
            const avatarHtml = (p.avatar_url && p.avatar_url !== '')
                ? `<img src="${p.avatar_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`
                : '👤';
            let playerName = p.username || 'Игрок';
            if (playerName.startsWith('@')) playerName = playerName.substring(1);
            let roleBadge = '';
            if (p.role === 'founder') roleBadge = '<span style="margin-left:5px;font-size:0.6rem;color:#ef4444;">👑</span>';
            else if (p.role === 'pioneer') roleBadge = '<span style="margin-left:5px;font-size:0.6rem;color:#00b4d8;">⭐</span>';
            else if (p.role === 'legend') roleBadge = '<span style="margin-left:5px;font-size:0.6rem;color:#FFD700;">👑</span>';
            html += `<div class="recent-player-item" onclick="openPlayerProfile(${p.user_id}, 0)">
                <div class="recent-player-avatar">${avatarHtml}</div>
                <div class="recent-player-info">
                    <div class="recent-player-name">${escapeHtml(playerName)}${roleBadge}</div>
                    <div class="recent-player-time">🕐 ${p.time_ago || 'только что'}</div>
                </div>
                <div class="recent-player-ticket">🎫 #${p.ticket_number}</div>
            </div>`;
        }
        container.innerHTML = html;
    }

    function updateRecentPlayers(players) {

    function startLPBoostPaymentCheck(expectedAmount) {
        let attempts = 0;
        const maxAttempts = 36;
        if (paymentCheckInterval) clearInterval(paymentCheckInterval);
        let userWalletAddress = tonConnectUI?.wallet?.account?.address || '';
        paymentCheckInterval = setInterval(async () => {
            attempts++;
            try {
                const res = await fetch('/api/ton/check_lp_boost_payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        expected_amount: expectedAmount,
                        sender_wallet: userWalletAddress
                    })
                });
                const data = await res.json();
                if (data && data.confirmed) {
                    clearInterval(paymentCheckInterval);
                    paymentCheckInterval = null;
                    showToast('✅ Награда получена! +50 LP зачислены!', 'success');
                    await updateStatus();
                    await updateLPBoostCount();
                    updateUI();
                } else if (attempts >= maxAttempts) {
                    clearInterval(paymentCheckInterval);
                    paymentCheckInterval = null;
                    showToast('⚠️ Не удалось подтвердить платеж, обратитесь в поддержку', 'error');
                }
            } catch(e) {
                console.error('Payment check error:', e);
            }
        }, 5000);
    }

    function initSlideCanvases(slideElement, ticket) {
        if (!slideElement) return;
        const ticketNumber = ticket.number;
        const revealed = ticket.revealed || [];
        for (let i = 0; i < 12; i++) {
            const canvas = slideElement.querySelector(`#scratch_${ticketNumber}_${i}`);
            if (canvas) {
                const isRevealed = revealed[i] === true;
                const number = ticket.numbers[i];
                const isWin = isDrawn && winningNumbers.includes(number);
                const numberDiv = canvas.parentElement.querySelector('.scratch-number-layer');
                if (isRevealed) {
                    canvas.style.display = 'none';

                    if (numberDiv) {
                        numberDiv.style.display = 'flex';
                        if (isWin) {
                            numberDiv.classList.add('win');
                            numberDiv.classList.remove('normal');
                        } else {
                            numberDiv.classList.add('normal');
                            numberDiv.classList.remove('win');
                        }
                    }
                } else {
                    initScratchCell(canvas.id, 70, number, isWin, false);
                    if (isDrawn) setupScratchHandlers(canvas.id, ticket.number, i, 70, isWin, number);
                }
            }
        }
    }

    function initScratchCell(canvasId, size, number, isWin, isRevealed) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        if (isRevealed) {
            canvas.style.display = 'none';
            canvas.isRevealed = true;
            return;
        }
        drawScratchPattern(ctx, size);
        canvas.isRevealed = false;
        canvas.number = number;
        canvas.isWin = isWin;
        canvas.erasedPercent = 0;
        const progressKey = `${canvasId}_progress`;
        if (scratchProgress.has(progressKey)) {
            const savedImageData = scratchProgress.get(progressKey);
            if (savedImageData) {
                ctx.putImageData(savedImageData, 0, 0);
                const imageData = ctx.getImageData(0, 0, size, size);
                let transparent = 0;
                for (let i = 3; i < imageData.data.length; i += 4) if (imageData.data[i] === 0) transparent++;
                canvas.erasedPercent = (transparent / (size * size)) * 100;
            }
        }
    }

    function drawScratchPattern(ctx, size) {
        const grad = ctx.createLinearGradient(0, 0, size, size);
        grad.addColorStop(0, '#8a8a8a');
        grad.addColorStop(1, '#6a6a6a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, size, size);
        ctx.font = `bold ${size * 0.32}px 'Inter'`;
        ctx.fillStyle = '#c0c0c0';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('WG', size / 2, size / 2);
        ctx.beginPath();
        ctx.strokeStyle = '#aaa';
        ctx.lineWidth = 1.5;
        for (let i = -size; i < size + size; i += 10) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i + size, size);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(size, i + size);
            ctx.stroke();
        }
    }

    // ========== ОСНОВНАЯ ФУНКЦИЯ СТИРАНИЯ С HTTP ЗАПРОСОМ ==========
    function setupScratchHandlers(canvasId, ticketNumber, cellIndex, size, isWin, number) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;

        const cell = canvas.parentElement;
        const numberDiv = cell.querySelector('.scratch-number-layer');
        numberDiv.style.display = 'flex';
        numberDiv.innerHTML = number;
        numberDiv.classList.add('normal');
        numberDiv.classList.remove('win');

        const getCoords = (clientX, clientY, targetCanvas) => {
            const rect = targetCanvas.getBoundingClientRect();
            const scaleX = targetCanvas.width / rect.width;
            const scaleY = targetCanvas.height / rect.height;
            let x = (clientX - rect.left) * scaleX;
            let y = (clientY - rect.top) * scaleY;
            x = Math.max(0, Math.min(targetCanvas.width, x));
            y = Math.max(0, Math.min(targetCanvas.height, y));
            return { x, y };
        };

        // ========== ИСПРАВЛЕННАЯ ФУНКЦИЯ СТИРАНИЯ ==========
        const eraseAt = (targetCanvas, x, y, tNum, cIdx, isWinCell, cellNumber) => {
    if (targetCanvas.isRevealed) return;

    // Устанавливаем флаг активности стирания
    isScratchingActive = true;
    if (scratchTimeout) clearTimeout(scratchTimeout);
    scratchTimeout = setTimeout(() => {
        isScratchingActive = false;
        console.log('✅ Стирание завершено, флаг сброшен');
    }, 1500);

    const ctx = targetCanvas.getContext('2d');
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    const progressKey = `${targetCanvas.id}_progress`;
    const imageData = ctx.getImageData(0, 0, targetCanvas.width, targetCanvas.height);
    scratchProgress.set(progressKey, imageData);

    let transparent = 0;
    for (let j = 3; j < imageData.data.length; j += 4) {
        if (imageData.data[j] === 0) transparent++;
    }
    targetCanvas.erasedPercent = (transparent / (targetCanvas.width * targetCanvas.height)) * 100;

    console.log(`💥 Стёрто ${targetCanvas.erasedPercent.toFixed(1)}% клетки ${cIdx} билета ${tNum}`);

    if (targetCanvas.erasedPercent >= 60 && !targetCanvas.isRevealed) {
        console.log(`✅ ОТПРАВЛЯЕМ ЗАПРОС на открытие клетки`);

        fetch('/api/reveal_ticket_cells', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: userId,
                ticket_number: tNum,
                cell_index: cIdx
            })
        })
        .then(response => response.json())
        .then(data => {
            console.log('📡 Ответ сервера:', data);
            if (data.success) {
                const cellDiv = targetCanvas.parentElement;
                const numDiv = cellDiv.querySelector('.scratch-number-layer');
                if (isWinCell) {
                    numDiv.classList.add('win');
                    numDiv.classList.remove('normal');
                }
                targetCanvas.style.display = 'none';
                targetCanvas.isRevealed = true;
                scratchProgress.delete(progressKey);

                if (navigator.vibrate) navigator.vibrate(30);
                showToast(`Клетка ${cellNumber} открыта! 🎉`, 'success');
            } else {
                console.log('❌ Сервер не подтвердил открытие:', data.message);
            }
        })
        .catch(error => {
            console.error('❌ Ошибка запроса:', error);
        });
    }
};

        let mouseErasing = false;

        const onMouseMove = (e) => {
            if (!mouseErasing || !isDrawn) return;
            e.preventDefault();
            const targetEl = document.elementFromPoint(e.clientX, e.clientY);
            const targetCanvas = targetEl?.closest('.scratch-canvas');
            if (targetCanvas && !targetCanvas.isRevealed) {
                const match = targetCanvas.id.match(/scratch_(\d+)_(\d+)/);
                if (match) {
                    const tNum = parseInt(match[1]);
                    const cIdx = parseInt(match[2]);
                    const currentTicket = currentTickets.find(t => t.number === tNum);
                    if (currentTicket) {
                        const isWinCell = isDrawn && winningNumbers.includes(currentTicket.numbers[cIdx]);
                        const { x, y } = getCoords(e.clientX, e.clientY, targetCanvas);
                        eraseAt(targetCanvas, x, y, tNum, cIdx, isWinCell, currentTicket.numbers[cIdx]);
                    }
                }
            }
        };

        const onMouseUp = () => {
            mouseErasing = false;
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
        };

        const onMouseDown = (e) => {
            if (!isDrawn) {
                showToast('Розыгрыш ещё не начался! ⏳', 'error');
                return;
            }
            if (canvas.isRevealed) return;
            e.preventDefault();
            mouseErasing = true;
            const { x, y } = getCoords(e.clientX, e.clientY, canvas);
            const match = canvas.id.match(/scratch_(\d+)_(\d+)/);
            if (match) {
                const tNum = parseInt(match[1]);
                const cIdx = parseInt(match[2]);
                const currentTicket = currentTickets.find(t => t.number === tNum);
                if (currentTicket) {
                    const isWinCell = isDrawn && winningNumbers.includes(currentTicket.numbers[cIdx]);
                    eraseAt(canvas, x, y, tNum, cIdx, isWinCell, currentTicket.numbers[cIdx]);
                }
            }
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        };

        let activeTouches = new Map();

        const onTouchStart = (e) => {
            if (!isDrawn) {
                showToast('Розыгрыш ещё не начался! ⏳', 'error');
                return;
            }
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
                const targetCanvas = targetEl?.closest('.scratch-canvas');
                if (targetCanvas && !targetCanvas.isRevealed) {
                    const match = targetCanvas.id.match(/scratch_(\d+)_(\d+)/);
                    if (match) {
                        const tNum = parseInt(match[1]);
                        const cIdx = parseInt(match[2]);
                        const currentTicket = currentTickets.find(t => t.number === tNum);
                        if (currentTicket) {
                            const isWinCell = isDrawn && winningNumbers.includes(currentTicket.numbers[cIdx]);
                            const { x, y } = getCoords(touch.clientX, touch.clientY, targetCanvas);
                            eraseAt(targetCanvas, x, y, tNum, cIdx, isWinCell, currentTicket.numbers[cIdx]);
                            activeTouches.set(touch.identifier, targetCanvas);
                        }
                    }
                }
            }
        };

        const onTouchMove = (e) => {
            if (!isDrawn) return;
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
                const targetCanvas = targetEl?.closest('.scratch-canvas');
                if (targetCanvas && !targetCanvas.isRevealed) {
                    const match = targetCanvas.id.match(/scratch_(\d+)_(\d+)/);
                    if (match) {
                        const tNum = parseInt(match[1]);
                        const cIdx = parseInt(match[2]);
                        const currentTicket = currentTickets.find(t => t.number === tNum);
                        if (currentTicket) {
                            const isWinCell = isDrawn && winningNumbers.includes(currentTicket.numbers[cIdx]);
                            const { x, y } = getCoords(touch.clientX, touch.clientY, targetCanvas);
                            eraseAt(targetCanvas, x, y, tNum, cIdx, isWinCell, currentTicket.numbers[cIdx]);
                            activeTouches.set(touch.identifier, targetCanvas);
                        }
                    }
                }
            }
        };

        const onTouchEnd = (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) activeTouches.delete(e.changedTouches[i].identifier);
        };

        canvas.addEventListener('mousedown', onMouseDown);
        canvas.addEventListener('touchstart', onTouchStart, { passive: false });
        canvas.addEventListener('touchmove', onTouchMove, { passive: false });
        canvas.addEventListener('touchend', onTouchEnd);
        canvas.addEventListener('touchcancel', onTouchEnd);
    }

    function updateTopPlayers() {
        if (!isDrawn) return;
        const playersData = {};
        currentTickets.forEach(ticket => {
            const revealed = ticket.revealed || [];
            const numbers = ticket.numbers;
            let matches = 0, revealedCount = 0;
            for (let i = 0; i < 12; i++) {

                    revealedCount++;
                    if (winningNumbers.includes(numbers[i])) matches++;
                }
            }
            if (revealedCount > 0) {
                const playerId = userId;
                if (!playersData[playerId] || playersData[playerId].matches < matches) {
                    playersData[playerId] = { matches: matches, revealed: revealedCount, user_id: playerId, username: username };
                }
            }
        });
        fetch('/api/lottery_all_tickets', { method: 'GET', headers: { 'Content-Type': 'application/json' } })
            .then(res => res.json())
            .then(data => {
                const allTickets = data.tickets || [];
                allTickets.forEach(ticket => {
                    const revealed = ticket.revealed || [];
                    const numbers = ticket.numbers;
                    let matches = 0, revealedCount = 0;
                    for (let i = 0; i < 12; i++) {
                        if (revealed[i]) {
                            revealedCount++;
                            if (winningNumbers.includes(numbers[i])) matches++;
                        }
                    }
                    if (revealedCount > 0) {
                        const playerId = ticket.user_id;
                        if (!playersData[playerId] || playersData[playerId].matches < matches) {
                            playersData[playerId] = { matches: matches, revealed: revealedCount, user_id: playerId, username: ticket.username || 'Игрок' };
                        }
                    }
                });
                const sorted = Object.values(playersData).sort((a, b) => b.matches - a.matches).slice(0, 5);
                updateTopPlayersList(sorted);
            })
            .catch(err => {
                console.error('Ошибка загрузки всех билетов:', err);
                const sorted = Object.values(playersData).sort((a, b) => b.matches - a.matches).slice(0, 5);
                updateTopPlayersList(sorted);
            });

    function updateTopPlayersList(players) {
        const container = document.getElementById('topPlayersList');
        if (!container) return;
        if (players.length === 0) {
            container.innerHTML = '<div class="empty-state">Пока никто не открыл билеты</div>';
            return;
        }
        let html = '';
        players.forEach((player, idx) => {
            let playerName = (player.username || 'Игрок').replace(/^@@/, '');
            if (playerName.startsWith('Player_')) playerName = 'Игрок';
            if (localHideFromTop && player.user_id == userId) playerName = 'Аноним';
            html += `<div class="top-player-item" onclick="openPlayerProfile(${player.user_id}, 0)">
                <div class="top-player-rank">${idx + 1}</div>
                <div class="top-player-avatar">👤</div>
                <div class="top-player-info">
                    <div class="top-player-name">${escapeHtml(playerName)}</div>
                    <div class="top-player-matches">Открыто: ${player.revealed}/12</div>
                </div>
                <div class="top-player-score">${player.matches}/12</div>
            </div>`;
        });
        container.innerHTML = html;
    }

    function startTimer(endTimeISO) {
        if (timerInterval) clearInterval(timerInterval);
        const endTime = new Date(endTimeISO);
        function updateTimer() {
            const now = new Date();
            const remaining = Math.max(0, Math.floor((endTime - now) / 1000));
            if (remaining <= 0) {
                clearInterval(timerInterval);
                const drawTimer = document.getElementById('drawTimer');
                if (drawTimer) {
                    drawTimer.innerHTML = '⏰ Время вышло!';
                    drawTimer.style.display = 'block';
                }
                return;
            }
            const minutes = Math.floor(remaining / 60);
            const seconds = remaining % 60;
            const drawTimer = document.getElementById('drawTimer');
            if (drawTimer) {
                drawTimer.innerHTML = `⏳ Осталось: ${minutes}:${seconds.toString().padStart(2, '0')}`;
                drawTimer.style.display = 'block';
            }
        }
        updateTimer();
        timerInterval = setInterval(updateTimer, 1000);
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        const drawTimer = document.getElementById('drawTimer');
        if (drawTimer) drawTimer.style.display = 'none';
    }

    function updateDrawUI() {
        const statusDiv = document.getElementById('drawStatus');
        const ticketBtn = document.getElementById('ticketBtn');
        const topPlayersBlock = document.getElementById('topPlayersBlock');
        const recentSection = document.getElementById('recentPlayersSection');
        if (isDrawn && winningNumbers.length > 0) {
            if (statusDiv) {
                statusDiv.innerHTML = '🎉 РОЗЫГРЫШ СОСТОЯЛСЯ! 🎉<br>⏳ Водите пальцем по клеткам, чтобы стереть защитный слой! У вас 3 часа!';
                statusDiv.classList.add('active');
            }
            if (ticketBtn) {
                ticketBtn.disabled = true;
                ticketBtn.classList.add('disabled');
                ticketBtn.textContent = '⏳ Идёт розыгрыш...';
            }
            if (topPlayersBlock) topPlayersBlock.style.display = 'block';
            if (recentSection) recentSection.style.display = 'none';
            updateTopPlayers();
        } else {
            if (statusDiv) {
                statusDiv.innerHTML = '⏳ Ожидание розыгрыша в 21:00';
                statusDiv.classList.remove('active');
            }
            if (ticketBtn) {
                ticketBtn.disabled = false;
                ticketBtn.classList.remove('disabled');
                ticketBtn.innerHTML = '<img src="/static/fire.png" alt="Принять участие" style="width: 20px; height: 20px;"> Принять участие за 100 LP';
            }
            if (topPlayersBlock) topPlayersBlock.style.display = 'none';
            if (recentSection) recentSection.style.display = 'block';
            stopTimer();
        }
    }

    function initSocket() {
        socket = io({
            reconnection: true,
            reconnectionAttempts: 3,
            reconnectionDelay: 2000,
            transports: ['websocket']
        });
        socket.on('connect', () => {
            socket.emit('get_draw_status', {});
            socket.emit('get_remaining_time', {});
        });
        socket.on('connect_error', (error) => console.log('Socket connection error:', error));
        socket.on('disconnect', (reason) => {
            if (reason === 'io server disconnect') socket.connect();
        });
        socket.on('remaining_time', (data) => {
            if (data.seconds > 0 && isDrawn) {
                const endTime = new Date(Date.now() + data.seconds * 1000);
                startTimer(endTime.toISOString());
            }
        });
        socket.on('draw_status', (data) => {
            isDrawn = data.is_drawn;
            winningNumbers = data.winning_numbers || [];
            updateDrawUI();
            if (isDrawn) loadUserTickets();
        });
        socket.on('draw_completed', (data) => {
            isDrawn = true;
            winningNumbers = data.winning_numbers || [];
            updateDrawUI();
            showToast(data.message, 'success');
            if (data.end_time) startTimer(data.end_time);
            updateLottery();
            loadUserTickets();
        });
        socket.on('auto_revealed', (data) => {
            showToast(data.message, 'info');
            loadUserTickets();
            updateTopPlayers();
            stopTimer();
        });
        socket.on('prizes_distributed', (data) => {
            showToast(data.message, 'success');
            stopTimer();
            updateStatus();
            updateLottery();
            loadUserTickets();
        });
        socket.on('draw_reset', (data) => {
            isDrawn = false;
            winningNumbers = [];
            updateDrawUI();
            showToast(data.message, 'info');
            updateLottery();
            loadUserTickets();
            stopTimer();
        });
        socket.on('cell_revealed', (data) => {
            // Не перезагружаем билеты при каждом открытии клетки - только если не активное стирание
            if (!isScratchingActive) {
                loadUserTickets();
                updateTopPlayers();
            } else {
                console.log('⏳ Пропускаем обновление из-за активного стирания');
            }
        });

        // ========== ОБРАБОТЧИКИ ДЛЯ ФОРТУНЫ ==========
        socket.on('fortune_timer_update', (data) => {
            if (data && data.time_left !== undefined) {
                if (typeof fortuneData !== 'undefined') {
                    fortuneData.timeLeft = data.time_left;
                }
                const timerElement = document.getElementById('fortuneTimer');
                if (timerElement) {
                    const minutes = Math.floor(data.time_left / 60);
                    const seconds = data.time_left % 60;
                    timerElement.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
                const timerBarFill = document.getElementById('timerBarFill');
                if (timerBarFill) {
                    const percent = (data.time_left / 300) * 100;
                    timerBarFill.style.width = percent + '%';
                }
            }
        });

        socket.on('fortune_round_ending_immediate', (data) => {
            console.log('⚡ МГНОВЕННЫЙ ЗАПУСК КОЛЕСА!', data);
            if (!data || !data.winner) return;
            if (data.winner === 'refund') {
                if (data.message) showToast(data.message, 'info');
                if (typeof loadFortuneData === 'function') loadFortuneData();
                return;
            }
            let userBetTeam = null;
            let userBetAmount = 0;
            if (typeof fortuneData !== 'undefined') {
                userBetTeam = fortuneData.userBetTeam;
                userBetAmount = fortuneData.userBetAmount;
            }
            if (typeof startWheelAnimation === 'function') {
                const yellowPool = data.yellow_pool || (typeof fortuneData !== 'undefined' ? fortuneData.yellowPool : 0);
                const redPool = data.red_pool || (typeof fortuneData !== 'undefined' ? fortuneData.redPool : 0);
                startWheelAnimation(data.winner, yellowPool, redPool, data.sector_factor || 0.5, userBetTeam, userBetAmount);
            }
        });

        socket.on('fortune_round_ended', (data) => {
            console.log('🎲 Фортуна: получение призов и очистка', data);
            if (data && data.winner && data.winner !== 'refund') {
                const overlay = document.getElementById('wheelOverlay');
                if (!overlay || !overlay.classList.contains('active')) {
                    setTimeout(() => {
                        let userBetTeam = null;
                        let userBetAmount = 0;
                        if (data.all_bets) {
                            const myBet = data.all_bets.find(bet => bet.user_id == userId);
                            if (myBet) {
                                userBetTeam = myBet.team;
                                userBetAmount = myBet.amount;
                            }
                        }
                        const yellowPool = data.yellow_pool || (typeof fortuneData !== 'undefined' ? fortuneData.yellowPool : 0);
                        const redPool = data.red_pool || (typeof fortuneData !== 'undefined' ? fortuneData.redPool : 0);
                        if (typeof startWheelAnimation === 'function') {
                            startWheelAnimation(data.winner, yellowPool, redPool, data.sector_factor || 0.5, userBetTeam, userBetAmount);
                        }
                    }, 100);
                }
            }
            if (data && data.winner === 'refund') {
                if (data.message) showToast(data.message, 'info');
                if (typeof loadFortuneData === 'function') loadFortuneData();
                return;
            }
            if (typeof fortuneData !== 'undefined') {
                setTimeout(() => {
                    fortuneData.yellowPool = 0;
                    fortuneData.redPool = 0;
                    fortuneData.yellowPlayers = [];
                    fortuneData.redPlayers = [];
                    fortuneData.userBetTeam = null;
                    fortuneData.userBetAmount = 0;
                    const yellowPlayersDiv = document.getElementById('yellowPlayers');
                    const redPlayersDiv = document.getElementById('redPlayers');
                    if (yellowPlayersDiv) yellowPlayersDiv.innerHTML = '<div class="empty-players-premium">🤝 Пока никто не поставил</div>';
                    if (redPlayersDiv) redPlayersDiv.innerHTML = '<div class="empty-players-premium">🤝 Пока никто не поставил</div>';
                    if (typeof updateFortuneUI === 'function') updateFortuneUI();
                }, 500);
            }
            if (typeof loadFortuneData === 'function') {
                setTimeout(() => loadFortuneData(), 2000);
                setTimeout(() => loadFortuneData(), 4000);
            }
            if (typeof syncData === 'function') {
                setTimeout(() => syncData(true), 3000);
            }
        });

        socket.on('fortune_pools_update', (data) => {
            if (typeof fortuneData === 'undefined') return;
            fortuneData.yellowPool = data.yellow_pool || 0;
            fortuneData.redPool = data.red_pool || 0;
            fortuneData.yellowPlayers = data.yellow_players || [];
            fortuneData.redPlayers = data.red_players || [];
            const yellowPoolEl = document.getElementById('yellowPool');
            const redPoolEl = document.getElementById('redPool');
            if (yellowPoolEl && yellowPoolEl.innerText !== (data.yellow_pool || 0).toFixed(2) + ' WG') {
                yellowPoolEl.innerText = (data.yellow_pool || 0).toFixed(2) + ' WG';
            }
            if (redPoolEl && redPoolEl.innerText !== (data.red_pool || 0).toFixed(2) + ' WG') {
                redPoolEl.innerText = (data.red_pool || 0).toFixed(2) + ' WG';
            }
            const total = (data.yellow_pool || 0) + (data.red_pool || 0);
            const yellowChanceEl = document.getElementById('yellowChance');
            const redChanceEl = document.getElementById('redChance');
            if (total > 0) {
                const yellowPercent = Math.round((data.yellow_pool / total) * 100);
                const redPercent = Math.round((data.red_pool / total) * 100);
                if (yellowChanceEl && yellowChanceEl.innerText !== yellowPercent + '%') {
                    yellowChanceEl.innerText = yellowPercent + '%';
                }
                if (redChanceEl && redChanceEl.innerText !== redPercent + '%') {
                    redChanceEl.innerText = redPercent + '%';
                }
            } else {
                if (yellowChanceEl) yellowChanceEl.innerText = '0%';
                if (redChanceEl) redChanceEl.innerText = '0%';
            }
            const yellowContainer = document.getElementById('yellowPlayers');
            const redContainer = document.getElementById('redPlayers');
            if (yellowContainer) {
                const players = data.yellow_players || [];
                if (players.length === 0) {
                    if (yellowContainer.innerHTML !== '<div class="empty-players-premium">🤝 Пока никто не поставил</div>') {
                        yellowContainer.innerHTML = '<div class="empty-players-premium">🤝 Пока никто не поставил</div>';
                    }
                } else {
                    const newHtml = players.map(p => `
                        <div class="player-card-premium" data-userid="${p.userId}">
                            <div class="player-avatar-premium">${p.avatarUrl ? `<img src="${p.avatarUrl}" loading="lazy">` : '🟡'}</div>
                            <div class="player-bet-premium">${(p.netAmount || p.amount || 0).toFixed(0)} WG</div>
                        </div>
                    `).join('');
                    if (yellowContainer.innerHTML !== newHtml) {
                        yellowContainer.innerHTML = newHtml;
                    }
                }
            }
            if (redContainer) {
                const players = data.red_players || [];
                if (players.length === 0) {
                    if (redContainer.innerHTML !== '<div class="empty-players-premium">🤝 Пока никто не поставил</div>') {
                        redContainer.innerHTML = '<div class="empty-players-premium">🤝 Пока никто не поставил</div>';
                    }
                } else {
                    const newHtml = players.map(p => `
                        <div class="player-card-premium" data-userid="${p.userId}">
                            <div class="player-avatar-premium">${p.avatarUrl ? `<img src="${p.avatarUrl}" loading="lazy">` : '🔴'}</div>
                            <div class="player-bet-premium">${(p.netAmount || p.amount || 0).toFixed(0)} WG</div>
                        </div>
                    `).join('');
                    if (redContainer.innerHTML !== newHtml) {
                        redContainer.innerHTML = newHtml;
                    }
                }
            }
            if (typeof syncData === 'function') {
                syncData(true);
            }
        });

        socket.on('fortune_timer_reset', (data) => {
            if (data && data.time_left) {
                if (typeof fortuneData !== 'undefined') {
                    fortuneData.timeLeft = data.time_left;
                }
                const timerElement = document.getElementById('fortuneTimer');
                if (timerElement) {
                    const minutes = Math.floor(data.time_left / 60);
                    const seconds = data.time_left % 60;
                    timerElement.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
                const timerBarFill = document.getElementById('timerBarFill');
                if (timerBarFill) {
                    const percent = (data.time_left / 300) * 100;
                    timerBarFill.style.width = percent + '%';
                }
                if (data.message) showToast(data.message, 'info');
            }
        });
    }

    async function loadLeaderboardData(period, forceRefresh = false) {
        let listDiv = document.getElementById('leaderboardList');

        try {
            let url;
            if (period === 'day') {

            } else {
                listDiv.innerHTML = '<div class="coming-soon" style="text-align:center; padding:40px;">🔄 Скоро появится!</div>';
                return;
            }
            let res = await fetch(url);
            let data = await res.json();
            if (!data || data.length === 0) {
                listDiv.innerHTML = '<div class="empty-state">😢 Нет данных за сегодня</div>';
                return;
            }
            let html = '';
            for (let userItem of data) {
                let avatar = userItem.avatar && userItem.avatar !== '👤'
                    ? `<img src="${userItem.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`
                    : '👤';

                } else if (userItem.role === 'pioneer' && !userItem.hide_from_top) {
                    roleBadge = '<span class="leaderboard-pioneer-badge">⭐</span>';
                }
                let rewardHtml = '';
                if (userItem.reward) {
                    rewardHtml = `<span class="reward">${userItem.reward}</span>`;

                html += `
                    <div class="leaderboard-item" onclick="openPlayerProfile(${userItem.user_id}, ${userItem.rank})">

                        <div class="avatar">${avatar}</div>

    function updateDailyTimer() {
        if (dailyTimerInterval) clearInterval(dailyTimerInterval);
        const claimBtn = document.getElementById('dailyClaimBtn');
        if (dailyData?.can_claim) {
            const dailyTimerValue = document.getElementById('dailyTimerValue');
            if (dailyTimerValue) dailyTimerValue.innerText = 'Доступно!';
            if (claimBtn) {
                claimBtn.classList.remove('disabled');
                claimBtn.style.background = 'linear-gradient(135deg, #FFD700, #FFA500)';
                claimBtn.style.opacity = '1';
            }
            return;
        }
        if (!dailyData?.next_claim_time) {
            const dailyTimerValue = document.getElementById('dailyTimerValue');
            if (dailyTimerValue) dailyTimerValue.innerText = 'Доступно!';
            if (claimBtn) {
                claimBtn.classList.remove('disabled');
                claimBtn.style.background = 'linear-gradient(135deg, #FFD700, #FFA500)';
                claimBtn.style.opacity = '1';
            }
            return;
        }
        const nextTime = new Date(dailyData.next_claim_time);
        function updateTimer() {
            const now = new Date();
            const diff = Math.max(0, Math.floor((nextTime - now) / 1000));
            if (diff <= 0) {
                clearInterval(dailyTimerInterval);
                const dailyTimerValue = document.getElementById('dailyTimerValue');
                if (dailyTimerValue) dailyTimerValue.innerText = 'Доступно!';
                if (claimBtn) {
                    claimBtn.classList.remove('disabled');
                    claimBtn.style.background = 'linear-gradient(135deg, #FFD700, #FFA500)';
                    claimBtn.style.opacity = '1';
                }
                loadDailyStatus();
                return;
            }
            const hours = Math.floor(diff / 3600);
            const minutes = Math.floor((diff % 3600) / 60);
            const seconds = diff % 60;
            const dailyTimerValue = document.getElementById('dailyTimerValue');
            if (dailyTimerValue) dailyTimerValue.innerText = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            if (claimBtn) {
                claimBtn.classList.add('disabled');
                claimBtn.style.background = '#555';
                claimBtn.style.opacity = '0.6';
            }
        }
        updateTimer();
        dailyTimerInterval = setInterval(updateTimer, 1000);
    }

    let dailyLeaderboardTimerInterval = null;

    function startDailyLeaderboardTimer() {
        if (dailyLeaderboardTimerInterval) clearInterval(dailyLeaderboardTimerInterval);
        function updateTimer() {
            const now = new Date();
            const nextMidnight = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), 21, 0, 0));
            let targetDate = new Date(nextMidnight);
            if (now > targetDate) {
                targetDate = new Date(targetDate.getTime() + 24 * 60 * 60 * 1000);
            }
            const diff = targetDate - now;
            if (diff <= 0) {
                if (dailyLeaderboardTimerInterval) clearInterval(dailyLeaderboardTimerInterval);
                loadLeaderboardData('day', true);
                startDailyLeaderboardTimer();
                return;
            }
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            const timerElement = document.getElementById('dailyLeaderboardTimer');
            if (timerElement) {
                timerElement.innerHTML = `${hours.toString().padStart(2, '0')} : ${minutes.toString().padStart(2, '0')} : ${seconds.toString().padStart(2, '0')}`;
            }
        }
        updateTimer();
        dailyLeaderboardTimerInterval = setInterval(updateTimer, 1000);
    }

        const code = document.getElementById('promoCodeInput')?.value.toUpperCase().trim() || '';
        const messageDiv = document.getElementById('promoMessage');
        const btn = document.getElementById('activatePromoBtn');
        if (!code) {
            if (messageDiv) {

            }
            return;
        }
        if (btn) {

        if (messageDiv) {
            messageDiv.innerHTML = '';
            messageDiv.classList.remove('success');

                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, code: code })

            const isSuccess = data.success === true || data.ok === true;

                if (messageDiv) {
                    messageDiv.innerHTML = `❌ ${errorMessage}`;
                    messageDiv.classList.remove('success');

                messageDiv.classList.remove('success');

    async function showTutorialStep() {
        if (currentTutorialStep >= tutorialSteps.length) {
            finishTutorial();
            return;
        }
        const step = tutorialSteps[currentTutorialStep];
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const targetNav = document.querySelector(`[data-tab="${step.tab}"]`);
        if (targetNav) targetNav.classList.add('active');
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        const targetPane = document.getElementById(`tab${step.tab.charAt(0).toUpperCase() + step.tab.slice(1)}`);
        if (targetPane) targetPane.classList.add('active');
        if (step.subTab) {
            const starsTab = document.querySelector('[data-shop-tab="stars"]');
            const normalTab = document.querySelector('[data-shop-tab="normal"]');
            const shopStars = document.getElementById('shopStars');
            const shopNormal = document.getElementById('shopNormal');
            if (step.subTab === 'stars') {
                if (starsTab) starsTab.classList.add('active');
                if (normalTab) normalTab.classList.remove('active');
                if (shopStars) shopStars.classList.add('active');
                if (shopNormal) shopNormal.classList.remove('active');
            } else {
                if (normalTab) normalTab.classList.add('active');
                if (starsTab) starsTab.classList.remove('active');
                if (shopNormal) shopNormal.classList.add('active');
                if (shopStars) shopStars.classList.remove('active');
            }
        }
        await new Promise(resolve => setTimeout(resolve, 200));
        let element = document.getElementById(step.elementId);
        if (!element) {
            const classMap = {
                'upgrade-card': '.upgrade-card',
                'ad-card': '.ad-card',
                'energyUpgradeCard': '#energyUpgradeCard',
                'tonDonateBtn': '#tonDonateBtn'
            };
            if (classMap[step.elementId]) {
                element = document.querySelector(classMap[step.elementId]);
            }
        }
        if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            await new Promise(resolve => setTimeout(resolve, 400));
            highlightElement(element, step.text, step.position);
        } else {
            console.warn(`Элемент ${step.elementId} не найден`);
            nextTutorialStep();
        }
    }

    function highlightElement(element, text, position = 'bottom') {
        if (!element) {
            nextTutorialStep();
            return;
        }
        const rect = element.getBoundingClientRect();
        const overlay = document.getElementById('tutorialOverlay');
        const highlight = document.getElementById('tutorialHighlight');
        const tooltip = document.getElementById('tutorialTooltip');
        const tooltipText = document.getElementById('tutorialText');
        if (overlay) overlay.style.backgroundColor = 'rgba(0,0,0,0.85)';
        if (overlay) overlay.classList.add('active');
        if (highlight) highlight.style.display = 'block';
        if (highlight) {
            highlight.style.top = (rect.top - 8) + 'px';
            highlight.style.left = (rect.left - 8) + 'px';
            highlight.style.width = (rect.width + 16) + 'px';
            highlight.style.height = (rect.height + 16) + 'px';
        }
        if (tooltipText) tooltipText.innerHTML = text;
        const tooltipHeight = 180;
        let tooltipTop, tooltipLeft;
        if (position === 'top' || rect.top < 100) {
            tooltipTop = rect.bottom + 15;
        } else {
            tooltipTop = rect.top - tooltipHeight - 15;
        }
        tooltipLeft = Math.max(10, Math.min(rect.left + (rect.width / 2) - 150, window.innerWidth - 310));
        if (tooltip) {
            tooltip.style.top = tooltipTop + 'px';
            tooltip.style.left = tooltipLeft + 'px';
            tooltip.style.display = 'block';
        }
    }

    function nextTutorialStep() {
        const overlay = document.getElementById('tutorialOverlay');
        const highlight = document.getElementById('tutorialHighlight');
        const tooltip = document.getElementById('tutorialTooltip');
        if (overlay) overlay.classList.remove('active');

        currentTutorialStep++;
        if (currentTutorialStep >= tutorialSteps.length) {
            finishTutorial();
        } else {
            setTimeout(() => showTutorialStep(), 300);
        }
    }

    let lastDomUpdate = 0;
    const DOM_UPDATE_THROTTLE = 100;
    function updateFortuneUI(force = false) {
        const now = Date.now();
        if (!force && now - lastDomUpdate < DOM_UPDATE_THROTTLE) return;
        lastDomUpdate = now;
        const e = fortuneUI.elements;
        if (!e.yellowPool) return;
        const yellowText = (fortuneData.yellowPool || 0).toFixed(2) + ' WG';
        const redText = (fortuneData.redPool || 0).toFixed(2) + ' WG';
        if (e.yellowPool.innerText !== yellowText) e.yellowPool.innerText = yellowText;
        if (e.redPool.innerText !== redText) e.redPool.innerText = redText;
        const total = (fortuneData.yellowPool || 0) + (fortuneData.redPool || 0);
        let yellowPercent = 50;
        let redPercent = 50;
        if (total > 0) {
            yellowPercent = Math.round((fortuneData.yellowPool / total) * 100);
            redPercent = Math.round((fortuneData.redPool / total) * 100);
        }
        if (e.yellowChance && e.yellowChance.innerText !== yellowPercent + '%') {
            e.yellowChance.innerText = yellowPercent + '%';
        }
        if (e.redChance && e.redChance.innerText !== redPercent + '%') {
            e.redChance.innerText = redPercent + '%';
        }
        if (e.fortuneUserBalance && typeof localWG !== 'undefined') {
            const balance = (localWG || 0).toFixed(2);
            if (e.fortuneUserBalance.innerText !== balance) {
                e.fortuneUserBalance.innerText = balance;
            }
        }
        requestAnimationFrame(() => updatePlayersListAsync(force));
    }

    let pendingPlayersUpdate = false;
    let yellowCacheHtml = '';
    let redCacheHtml = '';

    function updatePlayersListAsync(force = false) {
        if (pendingPlayersUpdate && !force) return;
        pendingPlayersUpdate = true;
        requestAnimationFrame(() => {
            const e = fortuneUI.elements;
            if (e.yellowPlayers) {
                const players = fortuneData.yellowPlayers || [];
                if (players.length === 0) {
                    const emptyHtml = '<div class="empty-players-premium">🤝 Пока никто не поставил</div>';
                    if (yellowCacheHtml !== emptyHtml) {
                        e.yellowPlayers.innerHTML = emptyHtml;
                        yellowCacheHtml = emptyHtml;
                    }
                } else {
                    const sorted = [...players].sort((a, b) => (b.netAmount || 0) - (a.netAmount || 0)).slice(0, 5);
                    let html = '';
                    for (let i = 0; i < sorted.length; i++) {
                        const p = sorted[i];
                        const amount = (p.netAmount || p.amount || 0).toFixed(0);
                        const avatarHtml = p.avatarUrl ? `<img src="${p.avatarUrl}" loading="lazy" onerror="this.parentElement.innerHTML='🟡'">` : '🟡';
                        const isCurrentUser = (p.userId == userId);
                        const currentUserClass = isCurrentUser ? ' current-user' : '';
                        html += `<div class="player-card-premium${currentUserClass}" data-userid="${p.userId}">
                            <div class="player-avatar-premium">${avatarHtml}</div>
                            <div class="player-bet-premium">${amount} WG</div>
                        </div>`;
                    }
                    if (yellowCacheHtml !== html) {
                        e.yellowPlayers.innerHTML = html;
                        yellowCacheHtml = html;
                    }
                }
            }
            if (e.redPlayers) {
                const players = fortuneData.redPlayers || [];
                if (players.length === 0) {
                    const emptyHtml = '<div class="empty-players-premium">🤝 Пока никто не поставил</div>';
                    if (redCacheHtml !== emptyHtml) {
                        e.redPlayers.innerHTML = emptyHtml;
                        redCacheHtml = emptyHtml;
                    }
                } else {
                    const sorted = [...players].sort((a, b) => (b.netAmount || 0) - (a.netAmount || 0)).slice(0, 5);
                    let html = '';
                    for (let i = 0; i < sorted.length; i++) {
                        const p = sorted[i];
                        const amount = (p.netAmount || p.amount || 0).toFixed(0);
                        const avatarHtml = p.avatarUrl ? `<img src="${p.avatarUrl}" loading="lazy" onerror="this.parentElement.innerHTML='🔴'">` : '🔴';
                        const isCurrentUser = (p.userId == userId);
                        const currentUserClass = isCurrentUser ? ' current-user' : '';
                        html += `<div class="player-card-premium${currentUserClass}" data-userid="${p.userId}">
                            <div class="player-avatar-premium">${avatarHtml}</div>
                            <div class="player-bet-premium">${amount} WG</div>
                        </div>`;
                    }
                    if (redCacheHtml !== html) {
                        e.redPlayers.innerHTML = html;
                        redCacheHtml = html;
                    }
                }
            }
            pendingPlayersUpdate = false;
        });
    }

        const yellowContainer = fortuneUI.elements.yellowPlayers;
        const redContainer = fortuneUI.elements.redPlayers;
        if (yellowContainer && !yellowContainer._hasListener) {
            yellowContainer.addEventListener('click', (e) => {
                const card = e.target.closest('.player-card-premium');
                if (card) {
                    const userId = card.dataset.userid;
                    if (userId && typeof openPlayerProfile === 'function') {
                        openPlayerProfile(parseInt(userId), 0);
                    }
                }
            });
            yellowContainer._hasListener = true;
        }
        if (redContainer && !redContainer._hasListener) {
            redContainer.addEventListener('click', (e) => {
                const card = e.target.closest('.player-card-premium');
                if (card) {
                    const userId = card.dataset.userid;
                    if (userId && typeof openPlayerProfile === 'function') {
                        openPlayerProfile(parseInt(userId), 0);
                    }
                }
            });
            redContainer._hasListener = true;
        }

    function startFortuneTimer() {
        if (fortuneUI.timerInterval) clearInterval(fortuneUI.timerInterval);
        fortuneUI.timerInterval = setInterval(() => {
            if (!fortuneUI.elements.modal?.classList.contains('active')) return;
            if (fortuneData.timeLeft > 0) {
                fortuneData.timeLeft--;
                updateTimerDisplay();
            } else if (fortuneData.timeLeft <= 0) {
                clearInterval(fortuneUI.timerInterval);
                fortuneUI.timerInterval = null;
                if ((fortuneData.yellowPool > 0 && fortuneData.redPool === 0) ||
                    (fortuneData.redPool > 0 && fortuneData.yellowPool === 0)) {
                    fortuneData.timeLeft = 300;
                    startFortuneTimer();
                    showFortuneMessage('⏰ Ставки только на одной команде! Таймер перезапущен.', 'info');
                } else if (fortuneData.yellowPool > 0 && fortuneData.redPool > 0) {
                    showFortuneMessage('🎲 Раунд завершается! Определяем победителя...', 'info');
                    endFortuneRound();
                } else {
                    fortuneData.isActive = false;
                    updateTimerDisplay();
                    showFortuneMessage('🤝 Пока нет ставок! Сделайте первую ставку!', 'info');
                }
            }
        }, 1000);
    }

        const e = fortuneUI.elements;
        if (!e.playTab) return;
        let messageDiv = document.getElementById('fortuneMessage');
        if (!messageDiv) {
            messageDiv = document.createElement('div');
            messageDiv.id = 'fortuneMessage';
            messageDiv.style.cssText = `
                background: rgba(255,215,0,0.1);
                border: 1px solid rgba(255,215,0,0.3);

                padding: 10px 16px;
                margin: 10px 20px;
                text-align: center;
                font-size: 0.75rem;
                color: #FFD700;

    function updateTimerDisplay() {
        const e = fortuneUI.elements;
        if (!e.fortuneTimer) return;
        const minutes = Math.floor(fortuneData.timeLeft / 60);
        const seconds = fortuneData.timeLeft % 60;
        const timeString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        if (e.fortuneTimer.innerText !== timeString) {
            e.fortuneTimer.innerText = timeString;
        }
        if (e.timerBarFill) {
            const percent = (fortuneData.timeLeft / 300) * 100;
            e.timerBarFill.style.width = percent + '%';
