    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getUpgradeCost(upgradeId, currentCount) {
    const configs = {
        1: { baseCost: 1.5 },
        2: { baseCost: 10 },
        3: { baseCost: 40 },
        4: { baseCost: 70 },
        5: { baseCost: 150 }
    };
    const config = configs[upgradeId];
    if (!config) return 0;
    if (currentCount === 0) return config.baseCost;
    return config.baseCost * Math.pow(1.65, currentCount);
}

    async function syncData(force = false) {
        if (isSyncing) return;

        if (!force && now - lastSyncTime < SYNC_DELAY) return;
        isSyncing = true;
        lastSyncTime = now;

    function startLPBoostPaymentCheck(expectedAmount) {
        let attempts = 0;
        const maxAttempts = 36;
        if (paymentCheckInterval) clearInterval(paymentCheckInterval);
        let userWalletAddress = tonConnectUI?.wallet?.account?.address || '';
        paymentCheckInterval = setInterval(async () => {
            attempts++;
            try {
                const res = await fetch('/api/ton/check_lp_boost_payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        expected_amount: expectedAmount,
                        sender_wallet: userWalletAddress
                    })
                });
                const data = await res.json();
                if (data && data.confirmed) {
                    clearInterval(paymentCheckInterval);
                    paymentCheckInterval = null;
                    showToast('✅ Награда получена! +50 LP зачислены!', 'success');
                    await updateStatus();
                    await updateLPBoostCount();
                    updateUI();
                } else if (attempts >= maxAttempts) {
                    clearInterval(paymentCheckInterval);
                    paymentCheckInterval = null;
                    showToast('⚠️ Не удалось подтвердить платеж, обратитесь в поддержку', 'error');
                }
            } catch(e) {
                console.error('Payment check error:', e);
            }
        }, 5000);
    }

    function renderTicketForCarousel(ticket) {

}

    function initSlideCanvases(slideElement, ticket) {
        if (!slideElement) return;
        const ticketNumber = ticket.number;
        const revealed = ticket.revealed || [];
        for (let i = 0; i < 12; i++) {
            const canvas = slideElement.querySelector(`#scratch_${ticketNumber}_${i}`);
            if (canvas) {
                const isRevealed = revealed[i] === true;
                const number = ticket.numbers[i];
                const isWin = isDrawn && winningNumbers.includes(number);
                const numberDiv = canvas.parentElement.querySelector('.scratch-number-layer');
                if (isRevealed) {
                    canvas.style.display = 'none';
                    canvas.isRevealed = true;
                    if (numberDiv) {
                        numberDiv.style.display = 'flex';
                        if (isWin) {
                            numberDiv.classList.add('win');
                            numberDiv.classList.remove('normal');
                        } else {
                            numberDiv.classList.add('normal');
                            numberDiv.classList.remove('win');
                        }
                    }
                } else {
                    initScratchCell(canvas.id, 70, number, isWin, false);
                    if (isDrawn) setupScratchHandlers(canvas.id, ticket.number, i, 70, isWin, number);
                }
            }
        }
    }

    function initScratchCell(canvasId, size, number, isWin, isRevealed) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        if (isRevealed) {
            canvas.style.display = 'none';
            canvas.isRevealed = true;
            return;
        }
        drawScratchPattern(ctx, size);
        canvas.isRevealed = false;
        canvas.number = number;
        canvas.isWin = isWin;
        canvas.erasedPercent = 0;
        const progressKey = `${canvasId}_progress`;
        if (scratchProgress.has(progressKey)) {
            const savedImageData = scratchProgress.get(progressKey);
            if (savedImageData) {
                ctx.putImageData(savedImageData, 0, 0);
                const imageData = ctx.getImageData(0, 0, size, size);
                let transparent = 0;
                for (let i = 3; i < imageData.data.length; i += 4) if (imageData.data[i] === 0) transparent++;
                canvas.erasedPercent = (transparent / (size * size)) * 100;
            }
        }
    }

    function drawScratchPattern(ctx, size) {
        const grad = ctx.createLinearGradient(0, 0, size, size);
        grad.addColorStop(0, '#8a8a8a');
        grad.addColorStop(1, '#6a6a6a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, size, size);
        ctx.font = `bold ${size * 0.32}px 'Inter'`;
        ctx.fillStyle = '#c0c0c0';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('WG', size / 2, size / 2);
        ctx.beginPath();
        ctx.strokeStyle = '#aaa';
        ctx.lineWidth = 1.5;
        for (let i = -size; i < size + size; i += 10) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i + size, size);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(size, i + size);
            ctx.stroke();
        }
    }

    // ========== ОСНОВНАЯ ФУНКЦИЯ СТИРАНИЯ С HTTP ЗАПРОСОМ ==========
    function setupScratchHandlers(canvasId, ticketNumber, cellIndex, size, isWin, number) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;

        const cell = canvas.parentElement;
        const numberDiv = cell.querySelector('.scratch-number-layer');
        numberDiv.style.display = 'flex';
        numberDiv.innerHTML = number;
        numberDiv.classList.add('normal');
        numberDiv.classList.remove('win');

        const getCoords = (clientX, clientY, targetCanvas) => {
            const rect = targetCanvas.getBoundingClientRect();
            const scaleX = targetCanvas.width / rect.width;
            const scaleY = targetCanvas.height / rect.height;
            let x = (clientX - rect.left) * scaleX;
            let y = (clientY - rect.top) * scaleY;
            x = Math.max(0, Math.min(targetCanvas.width, x));
            y = Math.max(0, Math.min(targetCanvas.height, y));
            return { x, y };
        };

        // ========== ИСПРАВЛЕННАЯ ФУНКЦИЯ СТИРАНИЯ ==========
        const eraseAt = (targetCanvas, x, y, tNum, cIdx, isWinCell, cellNumber) => {
    if (targetCanvas.isRevealed) return;

    // Устанавливаем флаг активности стирания
    isScratchingActive = true;
    if (scratchTimeout) clearTimeout(scratchTimeout);
    scratchTimeout = setTimeout(() => {
        isScratchingActive = false;
        console.log('✅ Стирание завершено, флаг сброшен');
    }, 1500);

    const ctx = targetCanvas.getContext('2d');
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    const progressKey = `${targetCanvas.id}_progress`;
    const imageData = ctx.getImageData(0, 0, targetCanvas.width, targetCanvas.height);
    scratchProgress.set(progressKey, imageData);

    let transparent = 0;
    for (let j = 3; j < imageData.data.length; j += 4) {
        if (imageData.data[j] === 0) transparent++;
    }
    targetCanvas.erasedPercent = (transparent / (targetCanvas.width * targetCanvas.height)) * 100;

    console.log(`💥 Стёрто ${targetCanvas.erasedPercent.toFixed(1)}% клетки ${cIdx} билета ${tNum}`);

    if (targetCanvas.erasedPercent >= 50 && !targetCanvas.isRevealed) {
        console.log(`✅🔓 ПОРОГ ДОСТИГНУТ! Отправляем запрос на открытие клетки ${cIdx} билета ${tNum}`);

        fetch('/api/reveal_ticket_cells', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Cache-Control': 'no-cache'
            },
            body: JSON.stringify({
                user_id: userId,
                ticket_number: tNum,
                cell_index: cIdx
            })
        })
        .then(response => response.json())
        .then(data => {
            console.log('📡 Ответ сервера:', data);
            if (data.success) {
                const cellDiv = targetCanvas.parentElement;
                const numDiv = cellDiv.querySelector('.scratch-number-layer');
                if (isWinCell) {
                    numDiv.classList.add('win');
                    numDiv.classList.remove('normal');
                }
                targetCanvas.style.display = 'none';
                targetCanvas.isRevealed = true;
                scratchProgress.delete(progressKey);

                if (navigator.vibrate) navigator.vibrate(30);
                showToast(`Клетка ${cellNumber} открыта! 🎉`, 'success');

                // ✅ ОБНОВЛЯЕМ ЛОКАЛЬНЫЙ МАССИВ СРАЗУ, БЕЗ ЗАПРОСА К СЕРВЕРУ
                for (let ticket of currentTickets) {
                    if (ticket.number === tNum) {
                        ticket.revealed[cIdx] = true;
                        break;
                    }
                }

                // ❌ НЕ ВЫЗЫВАЕМ loadUserTickets() И syncData() ЗДЕСЬ!
                // updateTopPlayers(); // можно вызвать, но осторожно
            } else {
                console.log('❌ Сервер не подтвердил открытие:', data.message);
            }
        })
        .catch(error => {
            console.error('❌ Ошибка запроса:', error);
            showToast('Ошибка связи с сервером', 'error');
        });
    }
};

        let mouseErasing = false;

        const onMouseMove = (e) => {
            if (!mouseErasing || !isDrawn) return;
            e.preventDefault();
            const targetEl = document.elementFromPoint(e.clientX, e.clientY);
            const targetCanvas = targetEl?.closest('.scratch-canvas');
            if (targetCanvas && !targetCanvas.isRevealed) {
                const match = targetCanvas.id.match(/scratch_(\d+)_(\d+)/);
                if (match) {
                    const tNum = parseInt(match[1]);
                    const cIdx = parseInt(match[2]);
                    const currentTicket = currentTickets.find(t => t.number === tNum);
                    if (currentTicket) {
                        const isWinCell = isDrawn && winningNumbers.includes(currentTicket.numbers[cIdx]);
                        const { x, y } = getCoords(e.clientX, e.clientY, targetCanvas);
                        eraseAt(targetCanvas, x, y, tNum, cIdx, isWinCell, currentTicket.numbers[cIdx]);
                    }
                }
            }
        };

        const onMouseUp = () => {
            mouseErasing = false;
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
        };

        const onMouseDown = (e) => {
            if (!isDrawn) {
                showToast('Розыгрыш ещё не начался! ⏳', 'error');
                return;
            }
            if (canvas.isRevealed) return;
            e.preventDefault();
            mouseErasing = true;
            const { x, y } = getCoords(e.clientX, e.clientY, canvas);
            const match = canvas.id.match(/scratch_(\d+)_(\d+)/);
            if (match) {
                const tNum = parseInt(match[1]);
                const cIdx = parseInt(match[2]);
                const currentTicket = currentTickets.find(t => t.number === tNum);
                if (currentTicket) {
                    const isWinCell = isDrawn && winningNumbers.includes(currentTicket.numbers[cIdx]);
                    eraseAt(canvas, x, y, tNum, cIdx, isWinCell, currentTicket.numbers[cIdx]);
                }
            }
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        };

        let activeTouches = new Map();

        const onTouchStart = (e) => {
            if (!isDrawn) {
                showToast('Розыгрыш ещё не начался! ⏳', 'error');
                return;
            }
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
                const targetCanvas = targetEl?.closest('.scratch-canvas');
                if (targetCanvas && !targetCanvas.isRevealed) {
                    const match = targetCanvas.id.match(/scratch_(\d+)_(\d+)/);
                    if (match) {
                        const tNum = parseInt(match[1]);
                        const cIdx = parseInt(match[2]);
                        const currentTicket = currentTickets.find(t => t.number === tNum);
                        if (currentTicket) {
                            const isWinCell = isDrawn && winningNumbers.includes(currentTicket.numbers[cIdx]);
                            const { x, y } = getCoords(touch.clientX, touch.clientY, targetCanvas);
                            eraseAt(targetCanvas, x, y, tNum, cIdx, isWinCell, currentTicket.numbers[cIdx]);
                            activeTouches.set(touch.identifier, targetCanvas);
                        }
                    }
                }
            }
        };

        const onTouchMove = (e) => {
            if (!isDrawn) return;
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
                const targetCanvas = targetEl?.closest('.scratch-canvas');
                if (targetCanvas && !targetCanvas.isRevealed) {
                    const match = targetCanvas.id.match(/scratch_(\d+)_(\d+)/);
                    if (match) {
                        const tNum = parseInt(match[1]);
                        const cIdx = parseInt(match[2]);
                        const currentTicket = currentTickets.find(t => t.number === tNum);
                        if (currentTicket) {
                            const isWinCell = isDrawn && winningNumbers.includes(currentTicket.numbers[cIdx]);
                            const { x, y } = getCoords(touch.clientX, touch.clientY, targetCanvas);
                            eraseAt(targetCanvas, x, y, tNum, cIdx, isWinCell, currentTicket.numbers[cIdx]);
                            activeTouches.set(touch.identifier, targetCanvas);
                        }
                    }
                }
            }
        };

        const onTouchEnd = (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) activeTouches.delete(e.changedTouches[i].identifier);
        };

        canvas.addEventListener('mousedown', onMouseDown);
        canvas.addEventListener('touchstart', onTouchStart, { passive: false });
        canvas.addEventListener('touchmove', onTouchMove, { passive: false });
        canvas.addEventListener('touchend', onTouchEnd);
        canvas.addEventListener('touchcancel', onTouchEnd);
    }

    function updateTopPlayers() {
        if (!isDrawn) return;
        const playersData = {};
        currentTickets.forEach(ticket => {
            const revealed = ticket.revealed || [];
            const numbers = ticket.numbers;
            let matches = 0, revealedCount = 0;
            for (let i = 0; i < 12; i++) {
                if (revealed[i]) {
                    revealedCount++;
                    if (winningNumbers.includes(numbers[i])) matches++;
                }
            }
            if (revealedCount > 0) {
                const playerId = userId;
                if (!playersData[playerId] || playersData[playerId].matches < matches) {
                    playersData[playerId] = { matches: matches, revealed: revealedCount, user_id: playerId, username: username };
                }
            }
        });
        fetch('/api/lottery_all_tickets', { method: 'GET', headers: { 'Content-Type': 'application/json' } })
            .then(res => res.json())
            .then(data => {
                const allTickets = data.tickets || [];
                allTickets.forEach(ticket => {
                    const revealed = ticket.revealed || [];
                    const numbers = ticket.numbers;
                    let matches = 0, revealedCount = 0;
                    for (let i = 0; i < 12; i++) {
                        if (revealed[i]) {
                            revealedCount++;
                            if (winningNumbers.includes(numbers[i])) matches++;
                        }
                    }
                    if (revealedCount > 0) {
                        const playerId = ticket.user_id;
                        if (!playersData[playerId] || playersData[playerId].matches < matches) {
                            playersData[playerId] = { matches: matches, revealed: revealedCount, user_id: playerId, username: ticket.username || 'Игрок' };
                        }
                    }
                });
                const sorted = Object.values(playersData).sort((a, b) => b.matches - a.matches).slice(0, 5);
                updateTopPlayersList(sorted);
            })
            .catch(err => {
                console.error('Ошибка загрузки всех билетов:', err);
                const sorted = Object.values(playersData).sort((a, b) => b.matches - a.matches).slice(0, 5);
                updateTopPlayersList(sorted);
            });
    }

    function updateTopPlayersList(players) {

        if (!container) return;
        if (players.length === 0) {
            container.innerHTML = '<div class="empty-state">Пока никто не открыл билеты</div>';
            return;
        }
        let html = '';
        players.forEach((player, idx) => {
            let playerName = (player.username || 'Игрок').replace(/^@@/, '');
            if (playerName.startsWith('Player_')) playerName = 'Игрок';
            if (localHideFromTop && player.user_id == userId) playerName = 'Аноним';
            html += `<div class="top-player-item" onclick="openPlayerProfile(${player.user_id}, 0)">

                </div>
                <div class="top-player-score">${player.matches}/12</div>

    function startTimer(endTimeISO) {
        if (timerInterval) clearInterval(timerInterval);
        const endTime = new Date(endTimeISO);
        function updateTimer() {
            const now = new Date();
            const remaining = Math.max(0, Math.floor((endTime - now) / 1000));
            if (remaining <= 0) {
                clearInterval(timerInterval);
                const drawTimer = document.getElementById('drawTimer');
                if (drawTimer) {
                    drawTimer.innerHTML = '⏰ Время вышло!';
                    drawTimer.style.display = 'block';
                }
                return;
            }
            const minutes = Math.floor(remaining / 60);
            const seconds = remaining % 60;
            const drawTimer = document.getElementById('drawTimer');
            if (drawTimer) {
                drawTimer.innerHTML = `⏳ Осталось: ${minutes}:${seconds.toString().padStart(2, '0')}`;
                drawTimer.style.display = 'block';
            }
        }
        updateTimer();
        timerInterval = setInterval(updateTimer, 1000);
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        const drawTimer = document.getElementById('drawTimer');
        if (drawTimer) drawTimer.style.display = 'none';
    }

    function updateDrawUI() {
        const statusDiv = document.getElementById('drawStatus');
        const ticketBtn = document.getElementById('ticketBtn');
        const topPlayersBlock = document.getElementById('topPlayersBlock');
        const recentSection = document.getElementById('recentPlayersSection');
        if (isDrawn && winningNumbers.length > 0) {
            if (statusDiv) {
                const t = TRANSLATIONS[currentLanguage] || TRANSLATIONS.ru;
statusDiv.innerHTML = `${t.draw_started || '🎉 РОЗЫГРЫШ СОСТОЯЛСЯ! 🎉'}<br>⏳ ${t.draw_instruction || 'Водите пальцем по клеткам, чтобы стереть защитный слой! У вас 3 часа!'}`;
                statusDiv.classList.add('active');
            }
            if (ticketBtn) {
                ticketBtn.disabled = true;
                ticketBtn.classList.add('disabled');
                const t = TRANSLATIONS[currentLanguage] || TRANSLATIONS.ru;
ticketBtn.textContent = `⏳ ${t.draw_in_progress || 'Идёт розыгрыш...'}`;
            }
            if (topPlayersBlock) topPlayersBlock.style.display = 'block';
            if (recentSection) recentSection.style.display = 'none';
            updateTopPlayers();
        } else {
            if (statusDiv) {
                const t = TRANSLATIONS[currentLanguage] || TRANSLATIONS.ru;
statusDiv.innerHTML = `⏳ ${t.waiting_draw || 'Ожидание розыгрыша в 21:00'}`;
                statusDiv.classList.remove('active');
            }
            if (ticketBtn) {
                ticketBtn.disabled = false;
                ticketBtn.classList.remove('disabled');
                const t = TRANSLATIONS[currentLanguage] || TRANSLATIONS.ru;

            }
            if (topPlayersBlock) topPlayersBlock.style.display = 'none';
            if (recentSection) recentSection.style.display = 'block';
            stopTimer();
        }
    }

    function initSocket() {
        socket = io({
            reconnection: true,
            reconnectionAttempts: 3,
            reconnectionDelay: 2000,
            transports: ['websocket']
        });
        socket.on('connect', () => {
            socket.emit('get_draw_status', {});
            socket.emit('get_remaining_time', {});
        });
        socket.on('connect_error', (error) => console.log('Socket connection error:', error));
        socket.on('disconnect', (reason) => {
            if (reason === 'io server disconnect') socket.connect();
        });
        socket.on('remaining_time', (data) => {
            if (data.seconds > 0 && isDrawn) {
                const endTime = new Date(Date.now() + data.seconds * 1000);
                startTimer(endTime.toISOString());
            }
        });
        socket.on('draw_status', (data) => {
            isDrawn = data.is_drawn;
            winningNumbers = data.winning_numbers || [];
            updateDrawUI();
            if (isDrawn) loadUserTickets();
        });
        socket.on('draw_completed', (data) => {
            isDrawn = true;
            winningNumbers = data.winning_numbers || [];
            updateDrawUI();
            showToast(data.message, 'success');
            if (data.end_time) startTimer(data.end_time);
            updateLottery();
            loadUserTickets();
        });
        socket.on('auto_revealed', (data) => {
            showToast(data.message, 'info');
            loadUserTickets();
            updateTopPlayers();
            stopTimer();
        });
        socket.on('prizes_distributed', (data) => {
            showToast(data.message, 'success');
            stopTimer();
            updateStatus();
            updateLottery();
            loadUserTickets();
        });
        socket.on('draw_reset', (data) => {
            isDrawn = false;
            winningNumbers = [];
            updateDrawUI();
            showToast(data.message, 'info');
            updateLottery();
            loadUserTickets();
            stopTimer();
        });
        socket.on('cell_revealed', (data) => {
            // Не перезагружаем билеты при каждом открытии клетки - только если не активное стирание
            if (!isScratchingActive) {
                loadUserTickets();
                updateTopPlayers();
            } else {
                console.log('⏳ Пропускаем обновление из-за активного стирания');
            }
        });

        // ========== ОБРАБОТЧИКИ ДЛЯ ФОРТУНЫ ==========
        socket.on('fortune_timer_update', (data) => {
            if (data && data.time_left !== undefined) {
                if (typeof fortuneData !== 'undefined') {
                    fortuneData.timeLeft = data.time_left;
                }
                const timerElement = document.getElementById('fortuneTimer');
                if (timerElement) {
                    const minutes = Math.floor(data.time_left / 60);
                    const seconds = data.time_left % 60;
                    timerElement.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
                const timerBarFill = document.getElementById('timerBarFill');
                if (timerBarFill) {
                    const percent = (data.time_left / 300) * 100;
                    timerBarFill.style.width = percent + '%';
                }
            }
        });

        socket.on('fortune_round_ending_immediate', (data) => {
            console.log('⚡ МГНОВЕННЫЙ ЗАПУСК КОЛЕСА!', data);
            if (!data || !data.winner) return;
            if (data.winner === 'refund') {
                if (data.message) showToast(data.message, 'info');
                if (typeof loadFortuneData === 'function') loadFortuneData();
                return;
            }
            let userBetTeam = null;
            let userBetAmount = 0;
            if (typeof fortuneData !== 'undefined') {
                userBetTeam = fortuneData.userBetTeam;
                userBetAmount = fortuneData.userBetAmount;
            }
            if (typeof startWheelAnimation === 'function') {
                const yellowPool = data.yellow_pool || (typeof fortuneData !== 'undefined' ? fortuneData.yellowPool : 0);
                const redPool = data.red_pool || (typeof fortuneData !== 'undefined' ? fortuneData.redPool : 0);
                startWheelAnimation(data.winner, yellowPool, redPool, data.sector_factor || 0.5, userBetTeam, userBetAmount);
            }
        });

        socket.on('fortune_round_ended', (data) => {
            console.log('🎲 Фортуна: получение призов и очистка', data);
            if (data && data.winner && data.winner !== 'refund') {
                const overlay = document.getElementById('wheelOverlay');
                if (!overlay || !overlay.classList.contains('active')) {
                    setTimeout(() => {
                        let userBetTeam = null;
                        let userBetAmount = 0;
                        if (data.all_bets) {
                            const myBet = data.all_bets.find(bet => bet.user_id == userId);
                            if (myBet) {
                                userBetTeam = myBet.team;
                                userBetAmount = myBet.amount;
                            }
                        }
                        const yellowPool = data.yellow_pool || (typeof fortuneData !== 'undefined' ? fortuneData.yellowPool : 0);
                        const redPool = data.red_pool || (typeof fortuneData !== 'undefined' ? fortuneData.redPool : 0);
                        if (typeof startWheelAnimation === 'function') {
                            startWheelAnimation(data.winner, yellowPool, redPool, data.sector_factor || 0.5, userBetTeam, userBetAmount);
                        }
                    }, 100);
                }
            }
            if (data && data.winner === 'refund') {
                if (data.message) showToast(data.message, 'info');
                if (typeof loadFortuneData === 'function') loadFortuneData();
                return;
            }
            if (typeof fortuneData !== 'undefined') {
                setTimeout(() => {
                    fortuneData.yellowPool = 0;
                    fortuneData.redPool = 0;
                    fortuneData.yellowPlayers = [];
                    fortuneData.redPlayers = [];
                    fortuneData.userBetTeam = null;
                    fortuneData.userBetAmount = 0;
                    const yellowPlayersDiv = document.getElementById('yellowPlayers');
                    const redPlayersDiv = document.getElementById('redPlayers');
                    if (yellowPlayersDiv) yellowPlayersDiv.innerHTML = '<div class="empty-players-premium">🤝 Пока никто не поставил</div>';
                    if (redPlayersDiv) redPlayersDiv.innerHTML = '<div class="empty-players-premium">🤝 Пока никто не поставил</div>';
                    if (typeof updateFortuneUI === 'function') updateFortuneUI();
                }, 500);
            }
            if (typeof loadFortuneData === 'function') {
                setTimeout(() => loadFortuneData(), 2000);
                setTimeout(() => loadFortuneData(), 4000);
            }
            if (typeof syncData === 'function') {
                setTimeout(() => syncData(true), 3000);
            }
        });

        socket.on('fortune_pools_update', (data) => {
            if (typeof fortuneData === 'undefined') return;
            fortuneData.yellowPool = data.yellow_pool || 0;
            fortuneData.redPool = data.red_pool || 0;
            fortuneData.yellowPlayers = data.yellow_players || [];
            fortuneData.redPlayers = data.red_players || [];
            const yellowPoolEl = document.getElementById('yellowPool');
            const redPoolEl = document.getElementById('redPool');
            if (yellowPoolEl && yellowPoolEl.innerText !== (data.yellow_pool || 0).toFixed(2) + ' WG') {
                yellowPoolEl.innerText = (data.yellow_pool || 0).toFixed(2) + ' WG';
            }
            if (redPoolEl && redPoolEl.innerText !== (data.red_pool || 0).toFixed(2) + ' WG') {
                redPoolEl.innerText = (data.red_pool || 0).toFixed(2) + ' WG';
            }
            const total = (data.yellow_pool || 0) + (data.red_pool || 0);
            const yellowChanceEl = document.getElementById('yellowChance');
            const redChanceEl = document.getElementById('redChance');
            if (total > 0) {
                const yellowPercent = Math.round((data.yellow_pool / total) * 100);
                const redPercent = Math.round((data.red_pool / total) * 100);
                if (yellowChanceEl && yellowChanceEl.innerText !== yellowPercent + '%') {
                    yellowChanceEl.innerText = yellowPercent + '%';
                }
                if (redChanceEl && redChanceEl.innerText !== redPercent + '%') {
                    redChanceEl.innerText = redPercent + '%';
                }
            } else {
                if (yellowChanceEl) yellowChanceEl.innerText = '0%';
                if (redChanceEl) redChanceEl.innerText = '0%';
            }
            const yellowContainer = document.getElementById('yellowPlayers');
            const redContainer = document.getElementById('redPlayers');
            if (yellowContainer) {
                const players = data.yellow_players || [];
                if (players.length === 0) {
                    if (yellowContainer.innerHTML !== '<div class="empty-players-premium">🤝 Пока никто не поставил</div>') {
                        yellowContainer.innerHTML = '<div class="empty-players-premium">🤝 Пока никто не поставил</div>';
                    }
                } else {
                    const newHtml = players.map(p => `
                        <div class="player-card-premium" data-userid="${p.userId}">
                            <div class="player-avatar-premium">${p.avatarUrl ? `<img src="${p.avatarUrl}" loading="lazy">` : '🟡'}</div>
                            <div class="player-bet-premium">${(p.netAmount || p.amount || 0).toFixed(0)} WG</div>
                        </div>
                    `).join('');
                    if (yellowContainer.innerHTML !== newHtml) {
                        yellowContainer.innerHTML = newHtml;
                    }
                }
            }
            if (redContainer) {
                const players = data.red_players || [];
                if (players.length === 0) {
                    if (redContainer.innerHTML !== '<div class="empty-players-premium">🤝 Пока никто не поставил</div>') {
                        redContainer.innerHTML = '<div class="empty-players-premium">🤝 Пока никто не поставил</div>';
                    }
                } else {
                    const newHtml = players.map(p => `
                        <div class="player-card-premium" data-userid="${p.userId}">
                            <div class="player-avatar-premium">${p.avatarUrl ? `<img src="${p.avatarUrl}" loading="lazy">` : '🔴'}</div>
                            <div class="player-bet-premium">${(p.netAmount || p.amount || 0).toFixed(0)} WG</div>
                        </div>
                    `).join('');
                    if (redContainer.innerHTML !== newHtml) {
                        redContainer.innerHTML = newHtml;
                    }
                }
            }
            if (typeof syncData === 'function') {
                syncData(true);
            }
        });

        socket.on('fortune_timer_reset', (data) => {
            if (data && data.time_left) {
                if (typeof fortuneData !== 'undefined') {
                    fortuneData.timeLeft = data.time_left;
                }
                const timerElement = document.getElementById('fortuneTimer');
                if (timerElement) {
                    const minutes = Math.floor(data.time_left / 60);
                    const seconds = data.time_left % 60;
                    timerElement.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
                const timerBarFill = document.getElementById('timerBarFill');
                if (timerBarFill) {
                    const percent = (data.time_left / 300) * 100;
                    timerBarFill.style.width = percent + '%';
                }
                if (data.message) showToast(data.message, 'info');
            }
        });
    }

        } catch(e) {
            console.error('Error loading prefixes from server:', e);
            // Фолбэк — показываем префиксы на основе локальной роли
            const allPrefixes = [
                { id: 'player', name: 'Игрок', icon: '🎮', desc: 'Выдаётся абсолютно всем игрокам', color: 'player' },

                { id: 'legend', name: 'Легенда', icon: '👑', desc: 'Топ-5 по достижениям', color: 'legend' }
            ];

            availablePrefixes = [];
            for (const prefix of allPrefixes) {
                if (prefix.id === 'player') {
                    availablePrefixes.push(prefix);
                } else if (prefix.id === 'pioneer' && (localRole === 'pioneer' || localRole === 'founder' || localRole === 'legend')) {
                    availablePrefixes.push(prefix);

    function updateDailyTimer() {
        if (dailyTimerInterval) clearInterval(dailyTimerInterval);
        const claimBtn = document.getElementById('dailyClaimBtn');
        if (dailyData?.can_claim) {
            const dailyTimerValue = document.getElementById('dailyTimerValue');
            if (dailyTimerValue) dailyTimerValue.innerText = 'Доступно!';
            if (claimBtn) {
                claimBtn.classList.remove('disabled');
                claimBtn.style.background = 'linear-gradient(135deg, #FFD700, #FFA500)';
                claimBtn.style.opacity = '1';
            }
            return;
        }
        if (!dailyData?.next_claim_time) {
            const dailyTimerValue = document.getElementById('dailyTimerValue');
            if (dailyTimerValue) dailyTimerValue.innerText = 'Доступно!';
            if (claimBtn) {
                claimBtn.classList.remove('disabled');
                claimBtn.style.background = 'linear-gradient(135deg, #FFD700, #FFA500)';
                claimBtn.style.opacity = '1';
            }
            return;
        }
        const nextTime = new Date(dailyData.next_claim_time);
        function updateTimer() {
            const now = new Date();
            const diff = Math.max(0, Math.floor((nextTime - now) / 1000));
            if (diff <= 0) {
                clearInterval(dailyTimerInterval);
                const dailyTimerValue = document.getElementById('dailyTimerValue');
                if (dailyTimerValue) dailyTimerValue.innerText = 'Доступно!';
                if (claimBtn) {
                    claimBtn.classList.remove('disabled');
                    claimBtn.style.background = 'linear-gradient(135deg, #FFD700, #FFA500)';
                    claimBtn.style.opacity = '1';
                }
                loadDailyStatus();
                return;
            }
            const hours = Math.floor(diff / 3600);
            const minutes = Math.floor((diff % 3600) / 60);
            const seconds = diff % 60;
            const dailyTimerValue = document.getElementById('dailyTimerValue');
            if (dailyTimerValue) dailyTimerValue.innerText = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            if (claimBtn) {
                claimBtn.classList.add('disabled');
                claimBtn.style.background = '#555';
                claimBtn.style.opacity = '0.6';
            }
        }
        updateTimer();
        dailyTimerInterval = setInterval(updateTimer, 1000);
    }

async function loadTasks() {
    const container = document.getElementById('tasksList');
    if (!container) return;

    // Показываем загрузку с анимацией
    container.innerHTML = `
        <div style="text-align: center; padding: 40px; opacity: 0.6;">
            <div style="display: inline-block; animation: spin 1s linear infinite; font-size: 2rem;">⏳</div>
            <div style="margin-top: 12px; font-size: 0.85rem;">Загрузка заданий...</div>
        </div>
    `;

    try {
        const res = await fetch(`/api/tasks?user_id=${userId}`, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json',
                'Cache-Control': 'no-cache, no-store, must-revalidate'
            }
        });

        if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();

        if (!data.success) {
            console.error('Ошибка загрузки заданий:', data.error);
            container.innerHTML = `<div class="empty-state">❌ ${data.error || 'Ошибка загрузки'}</div>`;
            return;

        if (!data.tasks || data.tasks.length === 0) {
            container.innerHTML = '<div class="empty-state">📭 Пока нет доступных заданий</div>';
            return;
        }

        currentTasks = data.tasks;
        renderTasksList();

    } catch(e) {
        console.error('Error loading tasks:', e);
        container.innerHTML = `
            <div class="empty-state" style="color: #f44336;">
                ❌ Ошибка соединения с сервером
                <div style="font-size: 0.7rem; margin-top: 8px; opacity: 0.6;">Попробуйте обновить страницу</div>
            </div>
        `;
    }
}

function getAvatarUrl(avatar) {
    if (!avatar) return '📢';  // По умолчанию для канала

    // Если это ссылка на картинку или статический файл
    if (avatar.startsWith('/static/') || avatar.startsWith('http://') || avatar.startsWith('https://')) {
        return `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.parentElement.innerHTML='📢';">`;
    }

    // Если это эмодзи или текст
    return avatar;
}

function renderTasksList() {
    const container = document.getElementById('tasksList');

    let html = '';
    for (const task of currentTasks) {

        // ✅ ПЕРЕВОДИМ СТАТУСЫ
        const statusText = task.is_completed ? `✅ ${t.task_status_completed || 'Выполнено'}` : `🟢 ${t.task_status_available || 'Доступно'}`;

        const rewardIcon = task.reward_type === 'wg' ? '💰' :
                          (task.reward_type === 'lp' ? '💎' :
                          (task.reward_type === 'usdt' ? '💵' : '⚡'));

        const taskType = task.task_type || 'channel';
        const typeIcon = taskType === 'miniapp' ? '📱' : '📢';
        const typeLabel = taskType === 'miniapp' ? t.task_type_miniapp || 'Mini App' : t.task_type_channel || 'Канал';

                `<img src="${task.channel_avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.parentElement.innerHTML='📢';">` :
                '📢';
        }

        html += `

                <div class="task-info">

                <div class="task-status">${statusText}</div>

async function checkTaskCompletion() {
    if (!selectedTask) {
        showToast('Ошибка: задание не выбрано', 'error');
        return;
    }
    if (selectedTask.is_completed) {
        showToast('Вы уже выполнили это задание', 'error');
        return;
    }

    // ✅ Ищем кнопку по классу, а не по ID
    const btn = document.querySelector('.task-check-btn');
    if (!btn) {
        showToast('Ошибка: кнопка не найдена', 'error');
        return;
    }

    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = '⏳ Проверка...';

    try {
        // Проверяем, есть ли у задания тип
        const taskType = selectedTask.task_type || 'channel';

        // Для Mini App задач — сначала проверяем клик
        if (taskType === 'miniapp') {
            // Проверяем, был ли клик по Mini App за последние 5 минут
            const checkRes = await fetch('/api/check_miniapp_click', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: userId,
                    task_id: selectedTask.id
                })
            });
            const checkData = await checkRes.json();

            if (!checkData.success) {
                showToast(checkData.error || '❌ Сначала откройте Mini App по ссылке!', 'error');
                btn.disabled = false;
                btn.textContent = originalText;
                return;
            }
        }

        // Основная проверка выполнения
        const res = await fetch('/api/check_task_subscription', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: userId,
                task_id: selectedTask.id
            })
        });

        const data = await res.json();

        if (data.success) {
            showToast(data.message || '✅ Задание выполнено!', 'success');
            selectedTask.is_completed = true;

            // Обновляем список заданий
            await loadTasks();

            // Закрываем модалку с деталями
            closeTaskDetailModal();

            // Обновляем статус игрока (баланс)
            await updateStatus();

            // Если есть награда, показываем её
            if (data.reward) {
                const rewardNames = {
                    'wg': 'WG',
                    'lp': 'LP',
                    'usdt': 'USDT',
                    'energy': 'энергии'
                };
                showToast(`🎁 Получено: +${data.reward.amount} ${rewardNames[data.reward.type] || data.reward.type}`, 'success');
            }
        } else {
            showToast(data.error || '❌ Условия не выполнены, попробуйте ещё раз', 'error');
        }
    } catch(e) {
        console.error('Error checking task:', e);
        showToast('❌ Ошибка при проверке, попробуйте позже', 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = originalText;
    }
}

    // ==================== ТАЙМЕР ДЛЯ ТОПА ДНЯ ====================
    let dailyLeaderboardTimerInterval = null;

    function startDailyLeaderboardTimer() {
        if (dailyLeaderboardTimerInterval) clearInterval(dailyLeaderboardTimerInterval);
        function updateTimer() {
            const now = new Date();
            const nextMidnight = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), 21, 0, 0));
            let targetDate = new Date(nextMidnight);
            if (now > targetDate) {
                targetDate = new Date(targetDate.getTime() + 24 * 60 * 60 * 1000);
            }
            const diff = targetDate - now;
            if (diff <= 0) {
                if (dailyLeaderboardTimerInterval) clearInterval(dailyLeaderboardTimerInterval);
                loadLeaderboardData('day', true);
                startDailyLeaderboardTimer();
                return;
            }
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            const timerElement = document.getElementById('dailyLeaderboardTimer');
            if (timerElement) {
                timerElement.innerHTML = `${hours.toString().padStart(2, '0')} : ${minutes.toString().padStart(2, '0')} : ${seconds.toString().padStart(2, '0')}`;
            }
        }
        updateTimer();
        dailyLeaderboardTimerInterval = setInterval(updateTimer, 1000);
    }

        }
        if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            await new Promise(resolve => setTimeout(resolve, 400));
            highlightElement(element, step.text, step.position);
        } else {
            console.warn(`Элемент ${step.elementId} не найден`);
            nextTutorialStep();
        }
    }

    function highlightElement(element, text, position = 'bottom') {
        if (!element) {
            nextTutorialStep();
            return;
        }
        const rect = element.getBoundingClientRect();
        const overlay = document.getElementById('tutorialOverlay');
        const highlight = document.getElementById('tutorialHighlight');
        const tooltip = document.getElementById('tutorialTooltip');
        const tooltipText = document.getElementById('tutorialText');
        if (overlay) overlay.style.backgroundColor = 'rgba(0,0,0,0.85)';
        if (overlay) overlay.classList.add('active');
        if (highlight) highlight.style.display = 'block';
        if (highlight) {
            highlight.style.top = (rect.top - 8) + 'px';
            highlight.style.left = (rect.left - 8) + 'px';
            highlight.style.width = (rect.width + 16) + 'px';
            highlight.style.height = (rect.height + 16) + 'px';
        }
        if (tooltipText) tooltipText.innerHTML = text;
        const tooltipHeight = 180;
        let tooltipTop, tooltipLeft;
        if (position === 'top' || rect.top < 100) {
            tooltipTop = rect.bottom + 15;
        } else {
            tooltipTop = rect.top - tooltipHeight - 15;
        }
        tooltipLeft = Math.max(10, Math.min(rect.left + (rect.width / 2) - 150, window.innerWidth - 310));
        if (tooltip) {
            tooltip.style.top = tooltipTop + 'px';
            tooltip.style.left = tooltipLeft + 'px';
            tooltip.style.display = 'block';
        }
    }

    let lastDomUpdate = 0;

    function updateFortuneUI(force = false) {
        const now = Date.now();
        if (!force && now - lastDomUpdate < DOM_UPDATE_THROTTLE) return;
        lastDomUpdate = now;
        const e = fortuneUI.elements;
        if (!e.yellowPool) return;
        const yellowText = (fortuneData.yellowPool || 0).toFixed(2) + ' WG';
        const redText = (fortuneData.redPool || 0).toFixed(2) + ' WG';
        if (e.yellowPool.innerText !== yellowText) e.yellowPool.innerText = yellowText;
        if (e.redPool.innerText !== redText) e.redPool.innerText = redText;
        const total = (fortuneData.yellowPool || 0) + (fortuneData.redPool || 0);
        let yellowPercent = 50;
        let redPercent = 50;
        if (total > 0) {
            yellowPercent = Math.round((fortuneData.yellowPool / total) * 100);
            redPercent = Math.round((fortuneData.redPool / total) * 100);
        }
        if (e.yellowChance && e.yellowChance.innerText !== yellowPercent + '%') {
            e.yellowChance.innerText = yellowPercent + '%';
        }
        if (e.redChance && e.redChance.innerText !== redPercent + '%') {
            e.redChance.innerText = redPercent + '%';
        }
        if (e.fortuneUserBalance && typeof localWG !== 'undefined') {
            const balance = (localWG || 0).toFixed(2);
            if (e.fortuneUserBalance.innerText !== balance) {
                e.fortuneUserBalance.innerText = balance;

    function updatePlayersListAsync(force = false) {
        if (pendingPlayersUpdate && !force) return;
        pendingPlayersUpdate = true;
        requestAnimationFrame(() => {
            const e = fortuneUI.elements;
            if (e.yellowPlayers) {
                const players = fortuneData.yellowPlayers || [];
                if (players.length === 0) {
                    const emptyHtml = '<div class="empty-players-premium">🤝 Пока никто не поставил</div>';
                    if (yellowCacheHtml !== emptyHtml) {
                        e.yellowPlayers.innerHTML = emptyHtml;
                        yellowCacheHtml = emptyHtml;
                    }
                } else {
                    const sorted = [...players].sort((a, b) => (b.netAmount || 0) - (a.netAmount || 0)).slice(0, 5);
                    let html = '';
                    for (let i = 0; i < sorted.length; i++) {
                        const p = sorted[i];
                        const amount = (p.netAmount || p.amount || 0).toFixed(0);
                        const avatarHtml = p.avatarUrl ? `<img src="${p.avatarUrl}" loading="lazy" onerror="this.parentElement.innerHTML='🟡'">` : '🟡';
                        const isCurrentUser = (p.userId == userId);
                        const currentUserClass = isCurrentUser ? ' current-user' : '';
                        html += `<div class="player-card-premium${currentUserClass}" data-userid="${p.userId}">
                            <div class="player-avatar-premium">${avatarHtml}</div>
                            <div class="player-bet-premium">${amount} WG</div>
                        </div>`;
                    }
                    if (yellowCacheHtml !== html) {
                        e.yellowPlayers.innerHTML = html;
                        yellowCacheHtml = html;
                    }
                }
            }
            if (e.redPlayers) {
                const players = fortuneData.redPlayers || [];
                if (players.length === 0) {
                    const emptyHtml = '<div class="empty-players-premium">🤝 Пока никто не поставил</div>';
                    if (redCacheHtml !== emptyHtml) {
                        e.redPlayers.innerHTML = emptyHtml;
                        redCacheHtml = emptyHtml;
                    }
                } else {
                    const sorted = [...players].sort((a, b) => (b.netAmount || 0) - (a.netAmount || 0)).slice(0, 5);
                    let html = '';
                    for (let i = 0; i < sorted.length; i++) {
                        const p = sorted[i];
                        const amount = (p.netAmount || p.amount || 0).toFixed(0);
                        const avatarHtml = p.avatarUrl ? `<img src="${p.avatarUrl}" loading="lazy" onerror="this.parentElement.innerHTML='🔴'">` : '🔴';
                        const isCurrentUser = (p.userId == userId);
                        const currentUserClass = isCurrentUser ? ' current-user' : '';
                        html += `<div class="player-card-premium${currentUserClass}" data-userid="${p.userId}">
                            <div class="player-avatar-premium">${avatarHtml}</div>
                            <div class="player-bet-premium">${amount} WG</div>
                        </div>`;
                    }
                    if (redCacheHtml !== html) {
                        e.redPlayers.innerHTML = html;
                        redCacheHtml = html;
                    }
                }
            }
            pendingPlayersUpdate = false;
        });

    function startFortuneTimer() {
        if (fortuneUI.timerInterval) clearInterval(fortuneUI.timerInterval);
        fortuneUI.timerInterval = setInterval(() => {
            if (!fortuneUI.elements.modal?.classList.contains('active')) return;
            if (fortuneData.timeLeft > 0) {
                fortuneData.timeLeft--;
                updateTimerDisplay();
            } else if (fortuneData.timeLeft <= 0) {
                clearInterval(fortuneUI.timerInterval);
                fortuneUI.timerInterval = null;
                if ((fortuneData.yellowPool > 0 && fortuneData.redPool === 0) ||
                    (fortuneData.redPool > 0 && fortuneData.yellowPool === 0)) {
                    fortuneData.timeLeft = 300;
                    startFortuneTimer();
                    showFortuneMessage('⏰ Ставки только на одной команде! Таймер перезапущен.', 'info');
                } else if (fortuneData.yellowPool > 0 && fortuneData.redPool > 0) {
                    showFortuneMessage('🎲 Раунд завершается! Определяем победителя...', 'info');
                    endFortuneRound();

                    fortuneData.isActive = false;

                    showFortuneMessage('🤝 Пока нет ставок! Сделайте первую ставку!', 'info');

    async function loadFortuneData() {
        if (window.isFortuneRoundEnding) {
            console.log('🔄 Фортуна: обновление пропущено (колесо крутится)');
            return;
        }
        try {
            const response = await fetch('/api/fortune/status');
            const data = await response.json();
            if (data.success) {
                const savedUserBetTeam = fortuneData?.userBetTeam;
                const savedUserBetAmount = fortuneData?.userBetAmount;
                if (typeof fortuneData !== 'undefined') {
                    fortuneData.timeLeft = data.time_left || 0;
                    fortuneData.yellowPool = data.yellow_pool || 0;
                    fortuneData.redPool = data.red_pool || 0;
                    fortuneData.yellowPlayers = data.yellow_bets || [];
                    fortuneData.redPlayers = data.red_bets || [];
                    if (savedUserBetTeam && savedUserBetAmount > 0) {
                        fortuneData.userBetTeam = savedUserBetTeam;
                        fortuneData.userBetAmount = savedUserBetAmount;
                        console.log('🔄 Восстановлена ставка пользователя:', savedUserBetTeam, savedUserBetAmount);
                    }
                }
                if (typeof updateFortuneUI === 'function') {
                    updateFortuneUI();
                } else {
                    const elements = {
                        yellowPool: document.getElementById('yellowPool'),
                        redPool: document.getElementById('redPool'),
                        timer: document.getElementById('fortuneTimer')
                    };
                    if (elements.yellowPool) elements.yellowPool.innerText = (data.yellow_pool || 0).toFixed(2) + ' WG';
                    if (elements.redPool) elements.redPool.innerText = (data.red_pool || 0).toFixed(2) + ' WG';
                    if (elements.timer) {
                        const m = Math.floor((data.time_left || 0) / 60);
                        const s = (data.time_left || 0) % 60;
                        elements.timer.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                    }
                    if (typeof updatePlayersListAsync === 'function') {
                        updatePlayersListAsync();
                    }
                }
            }
        } catch (e) {
            console.error('Ошибка при загрузке данных Фортуны:', e);
        }
    }

    let isBetting = false;

    async function submitBet() {
        if (isBetting) {
            showFortuneMessage('⏳ Подождите, ставка обрабатывается...', 'info');
            return;
        }
        if (!betModalState.team) {
            showFortuneMessage('Выберите команду для ставки', 'error');
            return;
        }
        const amount = parseFloat(document.getElementById('betAmount')?.value || '0');
        if (isNaN(amount) || amount < 10) {
            showFortuneMessage('Минимальная ставка — 10 WG', 'error');
            return;
        }
        if (amount > (localWG || 0)) {
            showFortuneMessage(`❌ Не хватает WG! У вас ${(localWG || 0).toFixed(2)} WG`, 'error');
            return;
        }
        isBetting = true;
        const submitBtn = document.getElementById('submitBetBtn');
        const originalText = submitBtn?.innerHTML || 'Подтвердить';
        if (submitBtn) submitBtn.innerHTML = '⏳ Обработка...';
        try {
            const response = await fetch('/api/fortune/bet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, team: betModalState.team, amount: amount })
            });
            const data = await response.json();
            if (data.success) {
                localWG = (localWG || 0) - amount;
                fortuneData.yellowPool = data.yellow_pool;
                fortuneData.redPool = data.red_pool;
                fortuneData.userBetTeam = betModalState.team;
                fortuneData.userBetAmount = data.user_total_bet || amount;
                const targetList = betModalState.team === 'yellow' ? fortuneData.yellowPlayers : fortuneData.redPlayers;
                const existingIndex = targetList.findIndex(p => p.userId == userId);
                const updatedPlayer = {
                    userId: userId,
                    amount: fortuneData.userBetAmount,
                    netAmount: data.net_amount || amount,
                    avatarUrl: photoUrl || '',
                    username: firstName || username || 'Игрок'
                };
                if (existingIndex >= 0) {
                    targetList[existingIndex] = updatedPlayer;
                } else {
                    targetList.push(updatedPlayer);
                }
                if (typeof updateUI === 'function') updateUI();
                else if (typeof syncData === 'function') syncData(true);
                updateFortuneUI();
                updateTeamHighlightUI();
                showFortuneMessage(`✅ Ставка ${amount} WG принята! Всего на команду: ${fortuneData.userBetAmount} WG`, 'success');
                closeBetModal();
            } else {
                showFortuneMessage(data.error || 'Ошибка при ставке', 'error');
            }
        } catch(e) {
            console.error('Bet error:', e);
            showFortuneMessage('Ошибка при ставке', 'error');
        } finally {
            isBetting = false;
            if (submitBtn) submitBtn.innerHTML = originalText;
        }
    }

    let wheelCanvas = document.getElementById('wheelCanvas');
    let wheelCtx = wheelCanvas?.getContext('2d');
    let wheelAnimationId = null;
    let wheelRotation = 0;
    let wheelTargetRotation = 0;
    let wheelStartTime = 0;
    let wheelWinner = null;
    let wheelPrizes = {};
    let isPreCaching = false;
    let wheelDuration = 15000;
    let fullRotationsCount = 12;
    let cachedWheelCanvas = document.createElement('canvas');
    let cachedWheelCtx = cachedWheelCanvas.getContext('2d');
    let isWheelCached = false;

    function cacheWheelGraphics(yellowChance, redChance) {
        if (!wheelCanvas || !cachedWheelCtx) return;
        cachedWheelCanvas.width = wheelCanvas.width;
        cachedWheelCanvas.height = wheelCanvas.height;
        const size = cachedWheelCanvas.width;
        const centerX = size / 2;
        const centerY = size / 2;
        const radius = size / 2 - 22;
        cachedWheelCtx.clearRect(0, 0, size, size);
        let yellowGrad = cachedWheelCtx.createRadialGradient(centerX, centerY, radius * 0.1, centerX, centerY, radius);
        yellowGrad.addColorStop(0, '#FFE666');
        yellowGrad.addColorStop(0.5, '#F1C40F');
        yellowGrad.addColorStop(1, '#8A6900');
        let redGrad = cachedWheelCtx.createRadialGradient(centerX, centerY, radius * 0.1, centerX, centerY, radius);
        redGrad.addColorStop(0, '#FF8080');
        redGrad.addColorStop(0.5, '#E74C3C');
        redGrad.addColorStop(1, '#6B160E');
        const yellowAngle = (yellowChance / 100) * Math.PI * 2;
        const redAngle = (Math.PI * 2) - yellowAngle;
        cachedWheelCtx.beginPath();
        cachedWheelCtx.moveTo(centerX, centerY);
        cachedWheelCtx.arc(centerX, centerY, radius, 0, yellowAngle);
        cachedWheelCtx.closePath();
        cachedWheelCtx.fillStyle = yellowGrad;
        cachedWheelCtx.fill();
        cachedWheelCtx.beginPath();
        cachedWheelCtx.moveTo(centerX, centerY);
        cachedWheelCtx.arc(centerX, centerY, radius, yellowAngle, Math.PI * 2);
        cachedWheelCtx.closePath();
        cachedWheelCtx.fillStyle = redGrad;
        cachedWheelCtx.fill();
        cachedWheelCtx.lineWidth = 4;
        cachedWheelCtx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
        cachedWheelCtx.beginPath();
        cachedWheelCtx.moveTo(centerX, centerY);
        cachedWheelCtx.lineTo(centerX + radius * Math.cos(0), centerY + radius * Math.sin(0));
        cachedWheelCtx.stroke();
        cachedWheelCtx.beginPath();
        cachedWheelCtx.moveTo(centerX, centerY);
        cachedWheelCtx.lineTo(centerX + radius * Math.cos(yellowAngle), centerY + radius * Math.sin(yellowAngle));
        cachedWheelCtx.stroke();
        cachedWheelCtx.save();
        cachedWheelCtx.font = '900 26px "Arial Black", Gadget, sans-serif';
        cachedWheelCtx.textAlign = 'center';
        cachedWheelCtx.textBaseline = 'middle';
        cachedWheelCtx.fillStyle = '#FFFFFF';
        cachedWheelCtx.shadowColor = 'rgba(0, 0, 0, 0.7)';
        cachedWheelCtx.shadowBlur = 8;
        const yellowMidAngle = yellowAngle / 2;
        const yellowTextX = centerX + radius * 0.62 * Math.cos(yellowMidAngle);
        const yellowTextY = centerY + radius * 0.62 * Math.sin(yellowMidAngle);
        cachedWheelCtx.fillText(`${Math.round(yellowChance)}%`, yellowTextX, yellowTextY);
        const redMidAngle = yellowAngle + redAngle / 2;
        const redTextX = centerX + radius * 0.62 * Math.cos(redMidAngle);
        const redTextY = centerY + radius * 0.62 * Math.sin(redMidAngle);
        cachedWheelCtx.fillText(`${Math.round(redChance)}%`, redTextX, redTextY);
        cachedWheelCtx.restore();
        cachedWheelCtx.beginPath();
        cachedWheelCtx.arc(centerX, centerY, radius + 11, 0, Math.PI * 2);
        cachedWheelCtx.lineWidth = 20;
        cachedWheelCtx.strokeStyle = '#181831';
        cachedWheelCtx.stroke();
        const totalBolts = 24;
        for (let i = 0; i < totalBolts; i++) {
            let boltAngle = (i * (Math.PI * 2 / totalBolts));
            let boltX = centerX + (radius + 11) * Math.cos(boltAngle);
            let boltY = centerY + (radius + 11) * Math.sin(boltAngle);
            cachedWheelCtx.beginPath();
            cachedWheelCtx.arc(boltX, boltY, 5, 0, Math.PI * 2);
            cachedWheelCtx.fillStyle = '#CCCCCC';
            cachedWheelCtx.fill();
            cachedWheelCtx.beginPath();
            cachedWheelCtx.arc(boltX, boltY, 1.5, 0, Math.PI * 2);
            cachedWheelCtx.fillStyle = '#111116';
            cachedWheelCtx.fill();
        }
        cachedWheelCtx.beginPath();
        cachedWheelCtx.arc(centerX, centerY, 42, 0, Math.PI * 2);
        cachedWheelCtx.fillStyle = '#0f0f20';
        cachedWheelCtx.fill();
        cachedWheelCtx.beginPath();
        cachedWheelCtx.arc(centerX, centerY, 36, 0, Math.PI * 2);
        cachedWheelCtx.lineWidth = 4;
        cachedWheelCtx.strokeStyle = '#FFD700';
        cachedWheelCtx.stroke();
        cachedWheelCtx.beginPath();
        cachedWheelCtx.arc(centerX, centerY, 33, 0, Math.PI * 2);
        cachedWheelCtx.fillStyle = '#16162d';
        cachedWheelCtx.fill();
        cachedWheelCtx.save();
        cachedWheelCtx.font = 'bold 22px "Arial Black", sans-serif';
        cachedWheelCtx.textAlign = 'center';
        cachedWheelCtx.textBaseline = 'middle';
        let textGrad = cachedWheelCtx.createLinearGradient(centerX, centerY - 12, centerX, centerY + 12);
        textGrad.addColorStop(0, '#FFFFFF');
        textGrad.addColorStop(0.5, '#F1C40F');
        textGrad.addColorStop(1, '#F39C12');
        cachedWheelCtx.fillStyle = textGrad;
        cachedWheelCtx.fillText('WG', centerX, centerY + 2);
        cachedWheelCtx.restore();
        isWheelCached = true;
        console.log('🚀 Графика колеса Фортуны успешно закэширована в памяти.');
    }

    function preCacheWheel() {
        if (isPreCaching || isWheelCached) return;
        isPreCaching = true;
        if (!cachedWheelCtx) {
            cachedWheelCanvas = document.createElement('canvas');
            cachedWheelCtx = cachedWheelCanvas.getContext('2d');
        }
        setTimeout(() => {
            if (wheelCanvas) {
                cacheWheelGraphics(50, 50);
                console.log('🎡 Предварительное кэширование колеса выполнено');
            }
            isPreCaching = false;
        }, 50);
    }

    function drawWheel() {
        if (!wheelCtx || !wheelCanvas || !isWheelCached) return;
        const size = wheelCanvas.width;
        const centerX = size / 2;
        const centerY = size / 2;
        wheelCtx.clearRect(0, 0, size, size);
        wheelCtx.save();
        wheelCtx.translate(centerX, centerY);
        wheelCtx.rotate(wheelRotation);
        wheelCtx.drawImage(cachedWheelCanvas, -centerX, -centerY);
        wheelCtx.restore();
    }

    function animateWheel(timestamp) {
        if (!wheelStartTime) {
            wheelStartTime = timestamp;
            requestAnimationFrame(animateWheel);
            return;
        }
        const elapsed = timestamp - wheelStartTime;
        let progress = Math.min(1, elapsed / wheelDuration);
        let easeProgress;
        if (progress < 0.15) {
            easeProgress = Math.pow(progress / 0.15, 1.5) * 0.12;
        } else {
            const normalizedProgress = (progress - 0.15) / 0.85;
            easeProgress = 0.12 + (1 - Math.pow(1 - normalizedProgress, 4)) * 0.88;
        }
        wheelRotation = wheelTargetRotation * easeProgress;
        drawWheel();
        if (progress < 1) {
            const fortuneModal = document.getElementById('fortuneModal');
            if (fortuneModal && fortuneModal.classList.contains('active')) {
                wheelAnimationId = requestAnimationFrame(animateWheel);
            } else {
                if (wheelAnimationId) {
                    cancelAnimationFrame(wheelAnimationId);
                    wheelAnimationId = null;
                }
                window.isFortuneRoundEnding = false;
                const overlay = document.getElementById('wheelOverlay');
                if (overlay) overlay.classList.remove('active');
                return;
            }
        } else {
            cancelAnimationFrame(wheelAnimationId);
            wheelAnimationId = null;
            window.isFortuneRoundEnding = false;
            if (wheelCanvas) wheelCanvas.style.transform = 'none';
            const winnerSide = wheelWinner;
            const winnerName = winnerSide === 'yellow' ? 'Жёлтые 🟡' : 'Красные 🔴';
            const userSide = wheelPrizes?.userBetTeam || null;
            const userBet = wheelPrizes?.userBetAmount || 0;
            const yellowPool = wheelPrizes?.yellowTotalPool || 0;
            const redPool = wheelPrizes?.redTotalPool || 0;
            const totalPool = yellowPool + redPool;
            let winAmount = 0;
            let loseAmount = 0;
            if (userSide && userBet > 0) {
                if (userSide === winnerSide && totalPool > 0) {
                    const winnerPool = winnerSide === 'yellow' ? yellowPool : redPool;
                    if (winnerPool > 0) {
                        const odds = totalPool / winnerPool;
                        winAmount = Math.round(userBet * odds * 100) / 100;
                    } else {
                        winAmount = userBet;
                    }
                } else if (userSide !== winnerSide && userBet > 0) {
                    loseAmount = userBet;
                }
            }
            const resultDiv = document.getElementById('wheelResult');
            if (resultDiv) {
                if (!userSide || userBet === 0) {
                    resultDiv.innerHTML = `🔔 Раунд завершён!<br>Победила команда <b>${winnerName}</b>!<br><span style="font-size:0.7rem;">Вы не участвовали в этом раунде.</span>`;
                } else if (userSide === winnerSide && winAmount > 0) {
                    resultDiv.innerHTML = `🎉 <b>ПОЗДРАВЛЯЕМ, ВЫ ВЫИГРАЛИ!</b> 🎉<br><br>
                        🟡 Команда <b>${winnerName}</b> победила!<br><br>
                        💰 <span style="font-size:1.2rem; color:#FFD700;">+${winAmount.toFixed(2)} WG</span><br>
                        📊 Ваша ставка: ${userBet} WG<br>
                        🎲 Коэффициент: ~${(winAmount / userBet).toFixed(2)}x`;
                } else if (userSide !== winnerSide && loseAmount > 0) {
                    resultDiv.innerHTML = `📉 <b>К сожалению, вы проиграли...</b><br><br>
                        🔴 Победила команда ${winnerName}<br><br>
                        💔 Потеряно: <span style="color:#f44336;">${loseAmount} WG</span><br>
                        🍀 В следующий раз точно повезёт!`;
                } else {
                    resultDiv.innerHTML = `🔔 Раунд завершён!<br>Победила команда <b>${winnerName}</b>!`;
                }
                resultDiv.classList.add('show');
            }
            const closeBtn = document.getElementById('wheelCloseBtn');
            if (closeBtn) {
                closeBtn.innerText = "Закрыть";
                closeBtn.classList.add('show');
            }
            if (typeof loadFortuneData === 'function') setTimeout(() => loadFortuneData(), 500);
            if (typeof loadFortuneHistory === 'function') setTimeout(() => loadFortuneHistory(), 1000);
            if (typeof syncData === 'function') setTimeout(() => syncData(true), 1500);
        }
    }

    function startWheelAnimation(winnerTeam, yellowPool, redPool, sectorFactor, userBetTeam = null, userBetAmount = 0) {
        window.isFortuneRoundEnding = true;
        const total = yellowPool + redPool;
        wheelPrizes = {
            yellowTotalPool: yellowPool,
            redTotalPool: redPool,
            userBetTeam: userBetTeam,
            userBetAmount: userBetAmount
        };
        let yellowChance = 50;
        let redChance = 50;
        if (total > 0) {
            yellowChance = (yellowPool / total) * 100;
            redChance = (redPool / total) * 100;
            if (yellowPool > 0 && redPool === 0) { yellowChance = 100; redChance = 0; }
            if (redPool > 0 && yellowPool === 0) { yellowChance = 0; redChance = 100; }
        }
        wheelWinner = winnerTeam;
        cacheWheelGraphics(yellowChance, redChance);
        if (wheelCanvas) {
            wheelCanvas.style.willChange = 'transform';
            wheelCanvas.style.transform = 'translateZ(0)';
        }
        const factor = (sectorFactor !== undefined && sectorFactor !== null) ? sectorFactor : 0.5;
        let targetSegmentAngle;
        if (winnerTeam === 'yellow') {
            targetSegmentAngle = (yellowChance / 100) * Math.PI * 2 * factor;
        } else {
            targetSegmentAngle = (yellowChance / 100) * Math.PI * 2 + (redChance / 100) * Math.PI * 2 * factor;
        }
        const fullRotations = fullRotationsCount * Math.PI * 2;
        wheelTargetRotation = fullRotations + (Math.PI * 1.5 - targetSegmentAngle);
        if (wheelAnimationId) cancelAnimationFrame(wheelAnimationId);
        wheelStartTime = 0;
        wheelRotation = 0;
        const fortuneModal = document.getElementById('fortuneModal');
        if (fortuneModal && fortuneModal.classList.contains('active')) {
            const overlay = document.getElementById('wheelOverlay');
            if (overlay) overlay.classList.add('active');
            const closeBtn = document.getElementById('wheelCloseBtn');
            if (closeBtn) closeBtn.classList.remove('show');
            const resultDiv = document.getElementById('wheelResult');
            if (resultDiv) resultDiv.classList.remove('show');
            requestAnimationFrame(animateWheel);
        } else {
            console.log('🎡 Колесо не показано (Фортуна закрыта)');
            window.isFortuneRoundEnding = false;
            if (typeof loadFortuneData === 'function') loadFortuneData();
            if (typeof syncData === 'function') syncData(true);
        }
    }

    const wheelCloseBtn = document.getElementById('wheelCloseBtn');
    if (wheelCloseBtn) {
        wheelCloseBtn.addEventListener('click', () => {

            if (overlay) overlay.classList.remove('active');

    }

    return new Date(start.getTime() + (CONTEST_DURATION_HOURS * 3600 * 1000));
}

function getNowMSK() {
    const now = new Date();
    return new Date(now.getTime() + (3 * 60 * 60 * 1000));
}

function isAdminUser() {
    const adminIds = [5264622363, 685035265];
    return adminIds.includes(userId);
}

function saveContestData() {
    const data = {
        newReferrals: contestNewReferrals,
        completedReferrals: contestCompletedReferrals,
        ticketsCount: contestTicketsCount,
        lastUpdated: Date.now()
    };
    localStorage.setItem('contest_data', JSON.stringify(data));
}

function loadContestData() {
    const saved = localStorage.getItem('contest_data');
    if (saved) {
        try {
            const data = JSON.parse(saved);
            // Загружаем только свежие данные (не старше 10 секунд)
            if (data.lastUpdated && Date.now() - data.lastUpdated < 10000) {
                contestNewReferrals = data.newReferrals || [];
                contestCompletedReferrals = data.completedReferrals || 0;
                contestTicketsCount = data.ticketsCount || 0;
                contestProgressRemainder = contestCompletedReferrals % 3;
            }
        } catch(e) {}
    }
}

async function getSecureReferralLink() {
    try {
        const res = await fetch('/api/get_referral_link', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId })
        });
        const data = await res.json();
        return data.link;
    } catch(e) {
        return null;
    }
}

function updateReferralsList(referrals) {
    const container = document.getElementById('contestReferralsList');
    const showAllBtn = document.getElementById('showAllReferralsBtn');
    const countBadge = document.getElementById('contestReferralsCountBadge');

    if (!container) return;
    if (countBadge) countBadge.innerText = referrals.length;

    const lastReferrals = [...referrals].reverse().slice(0, 5);

    if (lastReferrals.length === 0) {
        container.innerHTML = '<div class="empty-state">😢 Пока нет новых приглашённых</div>';
        if (showAllBtn) showAllBtn.style.display = 'none';
        return;
    }

    let html = '';
    for (let i = 0; i < lastReferrals.length; i++) {
        const ref = lastReferrals[i];
        const clicks = ref.total_clicks || 0;
        const isCompleted = clicks >= 300;
        const statusClass = isCompleted ? 'completed' : 'pending';
        const statusText = isCompleted ? '✓ Выполнен' : `${clicks}/300`;
        const icons = ['🥇', '🥈', '🥉', '👤', '👥'];

        html += `
            <div class="referral-item-compact" onclick="openPlayerProfile(${ref.user_id}, 0)">
                <div class="referral-info-compact">
                    <div class="referral-avatar-compact">${ref.avatar_url ? `<img src="${ref.avatar_url}">` : '👤'}</div>
                    <div>
                        <div class="referral-name-compact">${icons[i] || '👤'} ${escapeHtml(ref.username)}</div>
                        <div class="referral-progress-compact"> Прогресс: ${clicks}/300 кликов</div>
                    </div>
                </div>
                <div class="referral-status-compact ${statusClass}">${statusText}</div>
            </div>
        `;
    }
    container.innerHTML = html;

    if (referrals.length > 5) {
        showAllBtn.style.display = 'block';
    } else {
        showAllBtn.style.display = 'none';
    }
}

window.showAllReferralsModal = function() {
    const modal = document.getElementById('allReferralsModal');
    const listContainer = document.getElementById('allReferralsList');
    if (!modal || !listContainer) return;

    listContainer.innerHTML = '<div class="empty-state">Загрузка...</div>';
    modal.classList.add('active');

    fetch('/api/get_referrals', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId })
    })
    .then(res => res.json())
    .then(data => {
        const allReferrals = data.referrals || [];
        const contestStart = getContestStartDate();

        const newReferrals = allReferrals.filter(ref => {
            const refDate = new Date(ref.date);
            const refDateMSK = new Date(refDate.getTime() + (3 * 60 * 60 * 1000));
            return refDateMSK >= contestStart;
        });

        if (newReferrals.length === 0) {
            listContainer.innerHTML = '<div class="empty-state">😢 Пока нет новых приглашённых друзей</div>';
            return;
        }

        let html = '';
        for (const ref of newReferrals) {
            const clicks = ref.total_clicks || 0;
            const isCompleted = clicks >= 300;
            html += `
                <div class="all-referral-item" onclick="openPlayerProfile(${ref.user_id}, 0)">
                    <div class="all-referral-avatar">${ref.avatar_url ? `<img src="${ref.avatar_url}">` : '👤'}</div>
                    <div class="all-referral-info">
                        <div class="all-referral-name">${escapeHtml(ref.username)}</div>
                        <div class="all-referral-progress"> ${isCompleted ? '✅ Выполнен' : `⏳ ${clicks}/300 кликов`}</div>
                    </div>
                    <div>→</div>
                </div>
            `;
        }
        listContainer.innerHTML = html;
    })
    .catch(e => {
        console.error(e);
        listContainer.innerHTML = '<div class="empty-state">❌ Ошибка загрузки</div>';
    });
};
