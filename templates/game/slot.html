<!-- ===== СЛОТ-МАШИНА (СЕКРЕТНАЯ ИГРА) ===== -->
<div id="slotModal" class="game-modal-full">
    <div class="game-modal-full-content">
        <div class="game-modal-full-header">
            <h2>🎰 СЕКРЕТНАЯ ИГРА</h2>
            <button class="game-modal-full-close" onclick="closeSlotGame()">✕</button>
        </div>

        <!-- БАЛАНС -->
        <div class="fortune-balance-card">
            <span class="balance-label-premium">💰 Ваш баланс WG:</span>
            <span class="balance-value-premium" id="slotBalance">0</span>
        </div>

        <!-- БАРАБАНЫ -->
        <div style="text-align:center; margin: 20px 0;">
            <div style="display:flex; justify-content:center; gap: 20px; padding: 30px; background: rgba(255,215,0,0.05); border-radius: 24px; border: 2px solid rgba(255,215,0,0.2);">
                <div id="slotReel1" class="slot-reel">🪙</div>
                <div id="slotReel2" class="slot-reel">💎</div>
                <div id="slotReel3" class="slot-reel">⚡</div>
            </div>

            <!-- СТАВКА -->
            <div style="margin-top: 20px;">
                <div style="display:flex; justify-content:center; gap: 20px; align-items:center; flex-wrap: wrap;">
                    <span style="font-size: 0.9rem;">💰 Ставка:</span>
                    <input type="number" id="slotBet" value="10" min="1" style="width: 100px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,215,0,0.3); border-radius: 8px; padding: 8px 12px; color: white; font-size: 1rem; text-align: center;">
                    <button class="btn-sm" onclick="slotBetPreset(10)">10</button>
                    <button class="btn-sm" onclick="slotBetPreset(50)">50</button>
                    <button class="btn-sm" onclick="slotBetPreset(100)">100</button>
                    <button class="btn-sm" onclick="slotBetPreset(500)">500</button>
                </div>
            </div>

            <!-- КНОПКА КРУТИТЬ -->
            <button id="slotSpinBtn" onclick="spinSlot()" style="margin-top: 20px; background: linear-gradient(135deg, #FFD700, #FFA500); border: none; border-radius: 60px; padding: 16px 48px; font-weight: 700; font-size: 1.2rem; color: #0a0a1a; cursor: pointer;">
                🎲 КРУТИТЬ
            </button>

            <!-- РЕЗУЛЬТАТ -->
            <div id="slotResult" style="margin-top: 20px; font-size: 1.2rem; min-height: 40px;"></div>
        </div>

        <!-- ТАБЛИЦА ВЫИГРЫШЕЙ -->
        <div style="padding: 16px; background: rgba(255,255,255,0.03); border-radius: 16px; margin-top: 10px;">
            <div style="font-weight: 600; margin-bottom: 10px;">📋 Комбинации:</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.75rem;">
                <div>👑👑👑 — x50</div>
                <div>⭐⭐⭐ — x30</div>
                <div>🔥🔥🔥 — x20</div>
                <div>Любые 3 одинаковых — x10</div>
                <div>Любые 2 одинаковых — x2</div>
                <div style="color:#f44336;">Ничего — 0x</div>
            </div>
        </div>

        <!-- СТАТИСТИКА -->
        <div style="margin-top: 16px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; display: flex; justify-content: space-around; font-size: 0.75rem; opacity: 0.7;">
            <span>Игр: <span id="slotTotalSpins">0</span></span>
            <span>Побед: <span id="slotTotalWins">0</span></span>
            <span>Выиграно: <span id="slotTotalWon">0</span> WG</span>
        </div>
    </div>
</div>
